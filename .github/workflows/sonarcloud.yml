name: SonarCloud Analysis (Reusable)

# Reusable workflow — single source of truth for SonarCloud scans
# across all Orion Digital Solutions repositories.
#
# Secrets: only SONAR_TOKEN is required here (scanner + Quality Gate).
# The orchestrator CI Report uses SONAR_ISSUE_RETRIEVAL separately — see ci.yml.
#
# ── Coverage (IMPORTANT) ──────────────────────────────────────────────────────
# This workflow does NOT run your tests. The default "Sonar Way" Quality Gate
# requires ≥80% coverage on NEW code — with no coverage report imported, Sonar
# sees 0% and the gate FAILS. To provide coverage:
#   1. An EARLIER job in the same run runs your tests with coverage and produces a
#      Sonar-supported report (JS/TS → lcov.info, Python → coverage.xml, etc.).
#   2. That job uploads the report(s) as an artifact (preserving repo-relative paths).
#   3. Pass `coverage-artifact: <name>` (downloaded here pre-scan) plus the matching
#      report path via python-coverage-report / js-coverage-report / sonar-extra-args.
# Coverage is produced by the project repo and handed to CI — CI never runs tests.
#
# Caller usage:
#   uses: orion-digital-solutions/.github/.github/workflows/sonarcloud.yml@main
#   with:
#     project-key: orion-digital-solutions_my-repo
#   secrets: inherit

on:
  workflow_call:
    inputs:
      # ── Required ──────────────────────────────────────────────────────────
      project-key:
        description: "SonarCloud project key (e.g. orion-digital-solutions_repo-name)"
        required: true
        type: string

      # ── Optional — Project Metadata ───────────────────────────────────────
      project-name:
        description: "Human-readable project name displayed in SonarCloud"
        required: false
        type: string
        default: ""

      sonar-organization:
        description: "SonarCloud organization slug (defaults to orion-digital-solutions)"
        required: false
        type: string
        default: "orion-digital-solutions"

      # ── Optional — Source Configuration ───────────────────────────────────
      base-dir:
        description: >
          sonar.projectBaseDir for the scan. For a monorepo sub-project set its
          path (e.g. apps/web); leave blank for a single-package repo (defaults
          to the repo root). When set, `sources`, `exclusions`, and the coverage
          report-path inputs are interpreted RELATIVE to this directory, and the
          scanner reads sonar-project.properties from here (not the repo root).
        required: false
        type: string
        default: ""

      sources:
        description: "Comma-separated list of source directories to analyse (relative to base-dir when set)"
        required: false
        type: string
        default: "."

      exclusions:
        description: "Glob patterns to exclude from analysis (comma-separated)"
        required: false
        type: string
        default: "**/tests/**,**/test/**,**/__tests__/**,**/node_modules/**,**/vendor/**,**/*.min.js,**/migrations/**"

      # ── Optional — Coverage ───────────────────────────────────────────────
      python-coverage-report:
        description: "Path to Python XML coverage report (e.g. coverage.xml)"
        required: false
        type: string
        default: ""

      js-coverage-report:
        description: "Path to JS/TS LCOV coverage report (e.g. coverage/lcov.info)"
        required: false
        type: string
        default: ""

      coverage-artifact:
        description: >
          Name of a workflow artifact containing coverage report(s) produced by an
          EARLIER job in the same run. When set, this workflow downloads it into the
          workspace before scanning so the report paths below resolve. The artifact's
          internal paths must match the repo-relative paths you pass as report inputs.
        required: false
        type: string
        default: ""

      sonar-extra-args:
        description: >
          Extra raw `-Dsonar.*` properties appended to the scan, space-separated.
          Language-agnostic escape hatch for coverage of languages without a dedicated
          input above (e.g. '-Dsonar.go.coverage.reportPaths=cov.out').
        required: false
        type: string
        default: ""

      # ── Optional — Language / Runtime Setup ──────────────────────────────
      python-version:
        description: "Python version to set up (leave blank to skip Python setup)"
        required: false
        type: string
        default: ""

      node-version:
        description: "Node.js version to set up (leave blank to skip Node setup)"
        required: false
        type: string
        default: ""

      java-version:
        description: "Java version to set up (leave blank to skip Java setup — required for Java/Kotlin/Scala)"
        required: false
        type: string
        default: ""

      # ── Optional — Scan Behaviour ─────────────────────────────────────────
      fetch-depth:
        description: "Git fetch depth (0 = full history, required for blame/new-code detection)"
        required: false
        type: number
        default: 0

      fail-on-quality-gate:
        description: "Fail the workflow if the SonarCloud Quality Gate does not pass"
        required: false
        type: boolean
        default: true

      runner:
        description: "GitHub Actions runner label"
        required: false
        type: string
        default: "ubuntu-latest"

    secrets:
      SONAR_TOKEN:
        description: "SonarCloud authentication token (use the org-level SONAR_TOKEN secret)"
        required: true

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ${{ inputs.runner }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      # ── 2. Optional Runtime Setup ────────────────────────────────────────
      - name: Set up Python ${{ inputs.python-version }}
        if: inputs.python-version != ''
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up Node.js ${{ inputs.node-version }}
        if: inputs.node-version != ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          # This workflow never runs `npm ci`/`npm install` (the SonarCloud scanner
          # runs in its own container; coverage is passed in via a report path), so
          # dependency caching gives no benefit. setup-node v5+ AUTO-enables npm
          # caching when package.json has a `packageManager` field — that requires a
          # lockfile and would hard-fail repos without one ("Dependencies lock file is
          # not found"), so disable the automatic cache explicitly.
          package-manager-cache: false

      - name: Set up Java ${{ inputs.java-version }}
        if: inputs.java-version != ''
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin

      # ── 2b. Download coverage report(s) from an earlier job ──────────────
      # This workflow does NOT run your tests — coverage must be produced by an
      # earlier job in the same run and uploaded as an artifact. We download it
      # into the workspace root so the report paths resolve at scan time.
      # continue-on-error: a missing artifact should not mask the scan — the scan
      # still runs and the Quality Gate reports the (low/zero) coverage clearly.
      - name: Download coverage artifact (${{ inputs.coverage-artifact }})
        if: inputs.coverage-artifact != ''
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.coverage-artifact }}
          path: .

      # ── 3. Build Dynamic Sonar Properties ───────────────────────────────
      # If the repo already has a sonar-project.properties file, Sonar will
      # merge these extra args with it. If not, these args define the project.
      - name: Resolve SonarCloud scan properties
        id: sonar-props
        shell: bash
        run: |
          EXTRA_ARGS=""

          # JRE auto-provisioning is intentionally LEFT ENABLED: the scanner downloads
          # a SonarQube-Cloud-supported JRE at bootstrap, so the Java version stays
          # current automatically (Java 17 scanner support ends July 2026). Do NOT add
          # -Dsonar.scanner.skipJreProvisioning=true — that pins the container's bundled
          # Java 17 and re-triggers the "upgrade to Java 21" deprecation warning.
          # NOTE: auto-provisioning calls api.sonarcloud.io; SonarCloud returns HTTP 403
          # on those calls when the project has "Automatic Analysis" enabled. Disable it
          # (Project → Administration → Analysis Method) and use CI-based analysis.

          # Project key & org are always injected (can be overridden by
          # sonar-project.properties in the calling repo).
          EXTRA_ARGS+="-Dsonar.projectKey=${{ inputs.project-key }} "
          EXTRA_ARGS+="-Dsonar.organization=${{ inputs.sonar-organization }} "

          if [ -n "${{ inputs.project-name }}" ]; then
            EXTRA_ARGS+="-Dsonar.projectName='${{ inputs.project-name }}' "
          fi

          # Monorepo base dir: when set, sources/exclusions/coverage paths below are
          # interpreted relative to it. Left unset for single-package repos (root).
          if [ -n "${{ inputs.base-dir }}" ]; then
            EXTRA_ARGS+="-Dsonar.projectBaseDir=${{ inputs.base-dir }} "
          fi

          EXTRA_ARGS+="-Dsonar.sources=${{ inputs.sources }} "
          EXTRA_ARGS+="-Dsonar.exclusions=${{ inputs.exclusions }} "

          if [ -n "${{ inputs.python-coverage-report }}" ]; then
            EXTRA_ARGS+="-Dsonar.python.coverage.reportPaths=${{ inputs.python-coverage-report }} "
          fi

          if [ -n "${{ inputs.js-coverage-report }}" ]; then
            EXTRA_ARGS+="-Dsonar.javascript.lcov.reportPaths=${{ inputs.js-coverage-report }} "
          fi

          # Language-agnostic passthrough for any other coverage / scanner props.
          if [ -n "${{ inputs.sonar-extra-args }}" ]; then
            EXTRA_ARGS+="${{ inputs.sonar-extra-args }} "
          fi

          echo "extra_args=${EXTRA_ARGS}" >> "$GITHUB_OUTPUT"

      # ── 4. SonarCloud Scan ───────────────────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: ${{ steps.sonar-props.outputs.extra_args }}

      # ── 5. Quality Gate Check ────────────────────────────────────────────
      # The scanner writes report-task.txt under <projectBaseDir>/.scannerwork.
      # For a monorepo sub-project (base-dir set) that is NOT the repo-root
      # default the Quality Gate action assumes — point it at the right path,
      # otherwise it fails with ".scannerwork/report-task.txt does not exist".
      - name: SonarCloud Quality Gate check
        if: inputs.fail-on-quality-gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        with:
          scanMetadataReportFile: ${{ inputs.base-dir != '' && format('{0}/.scannerwork/report-task.txt', inputs.base-dir) || '.scannerwork/report-task.txt' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
