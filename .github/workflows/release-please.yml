name: Release Please (Reusable)

# Reusable workflow — automated versioning, changelogs, and GitHub Releases
# using Release Please (Google).
#
# Caller usage:
#   uses: orion-digital-solutions/.github/.github/workflows/release-please.yml@main
#   with:
#     release-type: python
#   secrets: inherit
#
# ── How it works ─────────────────────────────────────────────────────────────
# Every push to the target branch (default: main) that contains Conventional
# Commits triggers Release Please to open or update a "Release PR".
#
# The Release PR:
#   • Bumps the version (semver — major/minor/patch based on commit types)
#   • Generates/updates CHANGELOG.md from commit history
#   • Stays open and accumulates commits until you are ready to release
#
# Merging the Release PR:
#   • Creates a Git tag (e.g. v1.4.0)
#   • Creates a GitHub Release with the changelog as release notes
#   • Triggers the post-release steps below (SBOM, deployment hooks, etc.)
#
# ── Conventional Commit → version bump mapping ───────────────────────────────
#   feat:          minor bump  (1.0.0 → 1.1.0)
#   fix:           patch bump  (1.0.0 → 1.0.1)
#   feat!: / BREAKING CHANGE:  major bump  (1.0.0 → 2.0.0)
#   chore/docs/style/refactor: no bump (changelog entry only)
#
# ── Supported release types ──────────────────────────────────────────────────
# python, node, java, maven, gradle, go, dotnet, rust, helm, simple, ...
# Full list: https://github.com/googleapis/release-please?tab=readme-ov-file#release-types
#
# ── Monorepo / multi-package (manifest mode) ─────────────────────────────────
# Set manifest-mode: true and commit a release-please-config.json +
# .release-please-manifest.json at the repo root. Each package's release-type,
# version, and changelog sections are configured there (independent SemVer per
# package). In manifest mode the release-type / changelog-types inputs are
# ignored — all configuration lives in the config file.
# See: https://github.com/googleapis/release-please/blob/main/docs/manifest-releaser.md
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      # ── Release mode (choose ONE) ─────────────────────────────────────────────
      # Single-package repo  → set release-type (e.g. node, python).
      # Monorepo / multi-pkg → set manifest-mode: true and commit a
      #   release-please-config.json + .release-please-manifest.json at the root.
      release-type:
        description: >
          Release Please release type for a SINGLE-package repo (python, node,
          java, maven, dotnet, go, simple). Leave blank when manifest-mode is true.
        required: false
        type: string
        default: ""

      manifest-mode:
        description: >
          Run Release Please in manifest mode for monorepos with independently
          versioned packages. Reads config-file + manifest-file. When true,
          release-type is ignored.
        required: false
        type: boolean
        default: false

      config-file:
        description: "Path to the Release Please manifest config (manifest-mode only)"
        required: false
        type: string
        default: "release-please-config.json"

      manifest-file:
        description: "Path to the Release Please versions manifest (manifest-mode only)"
        required: false
        type: string
        default: ".release-please-manifest.json"

      # ── Optional — Branch ────────────────────────────────────────────────────
      target-branch:
        description: "Branch to watch for commits and open Release PRs against"
        required: false
        type: string
        default: "main"

      # ── Optional — Versioning ────────────────────────────────────────────────
      # Override the version file path if Release Please can't detect it.
      version-file:
        description: "Path to the version file (e.g. pyproject.toml, package.json)"
        required: false
        type: string
        default: ""

      # ── Optional — Changelog ────────────────────────────────────────────────
      changelog-path:
        description: "Path to the changelog file"
        required: false
        type: string
        default: "CHANGELOG.md"

      # Changelog types to include. Omitting feat/fix from this list only hides
      # them from the changelog — they still trigger version bumps.
      changelog-types:
        description: "JSON array of Conventional Commit types to include in CHANGELOG"
        required: false
        type: string
        default: >-
          [
            {"type":"feat",     "section":"Features"},
            {"type":"fix",      "section":"Bug Fixes"},
            {"type":"perf",     "section":"Performance"},
            {"type":"refactor", "section":"Refactoring"},
            {"type":"docs",     "section":"Documentation"},
            {"type":"chore",    "section":"Chores", "hidden":true},
            {"type":"ci",       "section":"CI/CD",  "hidden":true}
          ]

      # ── Optional — Post-release ──────────────────────────────────────────────
      # Trigger SBOM generation and attachment to the release automatically.
      generate-sbom-on-release:
        description: "Run the SBOM workflow when a release is created"
        required: false
        type: boolean
        default: true

      runner:
        description: "GitHub Actions runner label"
        required: false
        type: string
        default: "ubuntu-latest"

    outputs:
      # Pass these outputs to downstream jobs in the calling workflow.
      release-created:
        description: "true if a new GitHub Release was created by this run"
        value: ${{ jobs.release-please.outputs.release-created }}
      tag-name:
        description: "The Git tag created (e.g. v1.4.0), empty if no release"
        value: ${{ jobs.release-please.outputs.tag-name }}
      version:
        description: "The version string (e.g. 1.4.0), empty if no release"
        value: ${{ jobs.release-please.outputs.version }}
      upload-url:
        description: "GitHub Release upload URL for attaching extra assets"
        value: ${{ jobs.release-please.outputs.upload-url }}
      paths-released:
        description: "JSON array of package paths released this run (manifest mode; empty otherwise)"
        value: ${{ jobs.release-please.outputs.paths-released }}

permissions:
  contents: write       # create tags and GitHub Releases
  pull-requests: write  # open and update Release PRs

jobs:
  # ── Step 1: Create / update the Release PR ──────────────────────────────────
  release-please:
    name: Release Please
    runs-on: ${{ inputs.runner }}

    outputs:
      # Single-package (release-type) and manifest modes expose different outputs;
      # coalesce them so the caller sees one consistent interface. tag-name/version
      # are populated only in single-package mode (manifest mode can release many
      # packages at once — see paths-released).
      release-created: ${{ steps.rp.outputs.release_created || steps.rpm.outputs.releases_created }}
      tag-name:        ${{ steps.rp.outputs.tag_name }}
      version:         ${{ steps.rp.outputs.version }}
      upload-url:      ${{ steps.rp.outputs.upload_url }}
      paths-released:  ${{ steps.rpm.outputs.paths_released }}

    steps:
      # Single-package mode — driven by release-type.
      - name: Run Release Please (single package)
        id: rp
        if: ${{ !inputs.manifest-mode && inputs.release-type != '' }}
        uses: googleapis/release-please-action@v4
        with:
          release-type:    ${{ inputs.release-type }}
          target-branch:   ${{ inputs.target-branch }}
          changelog-path:  ${{ inputs.changelog-path }}
          changelog-types: ${{ inputs.changelog-types }}

      # Manifest mode — monorepo with independently versioned packages.
      # All per-package release-type, changelog sections, version bumps, pre-1.0
      # behaviour, extra-files, and plugins are configured in the config file,
      # NOT via inputs.
      - name: Run Release Please (manifest / monorepo)
        id: rpm
        if: ${{ inputs.manifest-mode }}
        uses: googleapis/release-please-action@v4
        with:
          config-file:   ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
          target-branch: ${{ inputs.target-branch }}

  # ── Step 2: Post-release steps (only runs when a release was just created) ──
  post-release:
    name: Post-release tasks
    needs: release-please
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag-name }}
          fetch-depth: 0

      # ── Generate and attach SBOM to the release ────────────────────────
      - name: Generate SBOM — SPDX JSON
        if: inputs.generate-sbom-on-release
        uses: anchore/sbom-action@v0
        with:
          path:                  "."
          format:                spdx-json
          output-file:           sbom.spdx.json
          upload-artifact:       true
          artifact-name:         sbom-spdx-${{ needs.release-please.outputs.tag-name || github.ref_name }}.json
          upload-release-assets: true

      - name: Generate SBOM — CycloneDX JSON
        if: inputs.generate-sbom-on-release
        uses: anchore/sbom-action@v0
        with:
          path:                  "."
          format:                cyclonedx-json
          output-file:           sbom.cyclonedx.json
          upload-artifact:       true
          artifact-name:         sbom-cyclonedx-${{ needs.release-please.outputs.tag-name || github.ref_name }}.json
          upload-release-assets: true

      # ── Release summary ─────────────────────────────────────────────────
      - name: Release summary
        shell: bash
        env:
          TAG:      ${{ needs.release-please.outputs.tag-name }}
          VERSION:  ${{ needs.release-please.outputs.version }}
          PATHS:    ${{ needs.release-please.outputs.paths-released }}
          GEN_SBOM: ${{ inputs.generate-sbom-on-release }}
        run: |
          {
            if [ -n "${TAG}" ]; then
              # Single-package release
              echo "### Release ${TAG} created"
              echo ""
              echo "| Field | Value |"
              echo "|-------|-------|"
              echo "| Tag | \`${TAG}\` |"
              echo "| Version | \`${VERSION}\` |"
            else
              # Manifest release — one or more packages
              echo "### Release(s) created"
              echo ""
              echo "Released package paths (manifest mode):"
              echo ""
              echo '```json'
              echo "${PATHS:-[]}"
              echo '```'
            fi
            if [ "${GEN_SBOM}" = "true" ]; then
              echo ""
              echo "SBOM (SPDX + CycloneDX) generated and attached to release assets."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
