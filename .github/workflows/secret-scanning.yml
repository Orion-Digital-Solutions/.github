name: Secret Scanning (Reusable)

# Reusable workflow — Gitleaks secret detection across all Orion repositories.
#
# Caller usage:
#   uses: orion-digital-solutions/.github/.github/workflows/secret-scanning.yml@main
#   secrets: inherit
#
# ── Delta scanning behaviour ──────────────────────────────────────────────────
# Pull requests  → scans only the commits in the PR diff (not full history).
# Push to branch → scans only the newly pushed commits.
# Scheduled run  → full repository history scan.
#
# ── Artifacts ────────────────────────────────────────────────────────────────
# Uploads `gitleaks-report` artifact (JSON) after every scan.
# The CI orchestrator report job reads this artifact to render findings.
#
# ── Custom rules ─────────────────────────────────────────────────────────────
# Place a .gitleaks.toml file in the calling repository root to extend or
# override rules (e.g. to allowlist known false positives).
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      full-scan:
        description: "Scan the full git history (forced on schedule events)"
        required: false
        type: boolean
        default: false

      gitleaks-version:
        description: "Gitleaks version to pin (e.g. v8.18.4)"
        required: false
        type: string
        default: "v8.18.4"

      runner:
        description: "GitHub Actions runner label"
        required: false
        type: string
        default: "ubuntu-latest"

    secrets:
      GITLEAKS_LICENSE:
        description: "Gitleaks license key (optional)"
        required: false

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ${{ inputs.runner }}

    steps:
      # fetch-depth: 0 required for delta log-opts to resolve commit ranges
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Install Gitleaks CLI ─────────────────────────────────────────────
      # We use the CLI directly (not the action wrapper) so we can control
      # the output format and capture structured JSON for the report artifact.
      - name: Install Gitleaks ${{ inputs.gitleaks-version }}
        shell: bash
        env:
          VERSION: ${{ inputs.gitleaks-version }}
        run: |
          VER="${VERSION#v}"    # strip leading 'v' for the filename
          URL="https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VER}_linux_x64.tar.gz"
          echo "Downloading gitleaks ${VERSION} from ${URL}"
          curl -sSL "$URL" | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # ── Build scan log options ───────────────────────────────────────────
      - name: Resolve scan range
        id: range
        shell: bash
        env:
          FULL_SCAN:  ${{ inputs.full-scan }}
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF:   ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA:   ${{ github.sha }}
        run: |
          if [ "${FULL_SCAN}" = "true" ] || [ "${EVENT_NAME}" = "schedule" ]; then
            echo "log_opts=--log-opts=--all"    >> "$GITHUB_OUTPUT"
            echo "scan_type=full-history"       >> "$GITHUB_OUTPUT"
          elif [ "${EVENT_NAME}" = "pull_request" ]; then
            echo "log_opts=--log-opts=origin/${BASE_REF}...HEAD" >> "$GITHUB_OUTPUT"
            echo "scan_type=pr-diff"            >> "$GITHUB_OUTPUT"
          elif [ -n "${BEFORE_SHA}" ] && [ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
            echo "log_opts=--log-opts=${BEFORE_SHA}...${HEAD_SHA}" >> "$GITHUB_OUTPUT"
            echo "scan_type=push-delta"         >> "$GITHUB_OUTPUT"
          else
            # First push to branch — scan last commit only
            echo "log_opts=--log-opts=-1"       >> "$GITHUB_OUTPUT"
            echo "scan_type=push-initial"       >> "$GITHUB_OUTPUT"
          fi

      # ── Run Gitleaks ─────────────────────────────────────────────────────
      - name: Gitleaks scan (${{ steps.range.outputs.scan_type }})
        id: scan
        continue-on-error: true   # we handle the exit code explicitly below
        shell: bash
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          LOG_OPTS:         ${{ steps.range.outputs.log_opts }}
        run: |
          # Use repo-level config if present
          CONFIG_ARG=""
          [ -f ".gitleaks.toml" ] && CONFIG_ARG="--config=.gitleaks.toml"

          gitleaks detect \
            --source . \
            ${LOG_OPTS} \
            ${CONFIG_ARG} \
            --report-format json \
            --report-path gitleaks-report.json \
            --redact \
            --verbose \
            --exit-code 1

          echo "gitleaks_exit=$?" >> "$GITHUB_OUTPUT"

      # Ensure the report file always exists (empty array when no findings)
      - name: Ensure report file exists
        if: always()
        shell: bash
        run: |
          [ -f gitleaks-report.json ] || echo "[]" > gitleaks-report.json

          # Inject metadata for the report job to consume
          FINDINGS=$(jq 'length' gitleaks-report.json 2>/dev/null || echo "0")
          SCAN_TYPE="${{ steps.range.outputs.scan_type }}"

          jq -n \
            --argjson findings "$(cat gitleaks-report.json)" \
            --arg scan_type "$SCAN_TYPE" \
            --arg gitleaks_version "${{ inputs.gitleaks-version }}" \
            --arg sha "${{ github.sha }}" \
            '{
              meta: {
                scan_type: $scan_type,
                gitleaks_version: $gitleaks_version,
                sha: $sha
              },
              findings: $findings
            }' > gitleaks-full-report.json

      # ── Upload report artifact ───────────────────────────────────────────
      - name: Upload Gitleaks report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-full-report.json
          retention-days: 7
          if-no-files-found: warn

      # ── Fail the job if secrets were detected ────────────────────────────
      - name: Fail if secrets detected
        if: steps.scan.outcome == 'failure'
        shell: bash
        run: |
          COUNT=$(jq '.findings | length' gitleaks-full-report.json 2>/dev/null || echo "unknown")
          echo "::error::Gitleaks detected ${COUNT} secret(s). Review the 'gitleaks-report' artifact and rotate any exposed credentials immediately."
          exit 1
