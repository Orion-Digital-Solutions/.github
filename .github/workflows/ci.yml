name: Orion CI Orchestrator (Reusable)

# Central CI orchestrator — single source of truth for all quality, security,
# and release workflows across every Orion Digital Solutions repository.
#
# ── Caller usage (add ONE file to each project repo) ─────────────────────────
#
#   uses: orion-digital-solutions/.github/.github/workflows/ci.yml@main
#   with:
#     sonar-project-key: orion-digital-solutions_my-repo
#     release-type: python
#   secrets: inherit
#
# ── Execution model ───────────────────────────────────────────────────────────
#
#   Phase 1 — parallel scans (fast feedback, run on every event):
#     secret-scan  ──┐
#     sonarcloud   ──┼──► all must pass
#     license      ──┘
#
#   Phase 2 — gated on Phase 1 (push to main branch only):
#     release-please  (opens/merges release PR)
#     sbom            (generates SBOM artifacts — independent of release-please)
#
#   Final — always runs:
#     report  (detailed consolidated markdown summary — queries SonarCloud API,
#              parses Gitleaks JSON and license JSON artifacts)
#
# ── What runs and when ────────────────────────────────────────────────────────
#   pull_request     →  Phase 1 only
#   push (main)      →  Phase 1 + Phase 2
#   release created  →  SBOM only
#   schedule         →  Phase 1 only (full-history secret + license scans)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      sonar-project-key:
        description: "SonarCloud project key (orion-digital-solutions_<repo>). Leave blank to skip."
        required: false
        type: string
        default: ""

      sonar-python-coverage-report:
        description: "Path to Python XML coverage report (e.g. coverage.xml)"
        required: false
        type: string
        default: ""

      sonar-js-coverage-report:
        description: "Path to JS/TS LCOV coverage report (e.g. coverage/lcov.info)"
        required: false
        type: string
        default: ""

      python-version:
        description: "Python version to set up (e.g. '3.11'). Leave blank to skip."
        required: false
        type: string
        default: ""

      node-version:
        description: "Node.js version to set up (e.g. '20'). Leave blank to skip."
        required: false
        type: string
        default: ""

      java-version:
        description: "Java version to set up (e.g. '17'). Leave blank to skip."
        required: false
        type: string
        default: ""

      release-type:
        description: "Release Please release type (python, node, java, dotnet, go, simple). Leave blank to skip."
        required: false
        type: string
        default: ""

      main-branch:
        description: "Name of the default/main branch"
        required: false
        type: string
        default: "main"

      forbidden-licenses:
        description: "Comma-separated SPDX license IDs to treat as violations (overrides org default)"
        required: false
        type: string
        default: ""

      secret-scan-full-history:
        description: "Force a full git history secret scan"
        required: false
        type: boolean
        default: false

      runner:
        description: "GitHub Actions runner label"
        required: false
        type: string
        default: "ubuntu-latest"

    outputs:
      release-created:
        description: "true if a new GitHub Release was created"
        value: ${{ jobs.release-please.outputs.release-created }}
      release-tag:
        description: "Git tag of the new release (e.g. v1.4.0)"
        value: ${{ jobs.release-please.outputs.tag-name }}
      release-version:
        description: "Version string of the new release (e.g. 1.4.0)"
        value: ${{ jobs.release-please.outputs.version }}

    secrets:
      SONAR_TOKEN:
        description: "SonarCloud token (org-level secret)"
        required: false
      GITLEAKS_LICENSE:
        description: "Gitleaks license key (optional)"
        required: false

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 1 — Parallel security & quality scans
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  secret-scan:
    name: Secret Scanning
    uses: orion-digital-solutions/.github/.github/workflows/secret-scanning.yml@main
    with:
      full-scan: ${{ inputs.secret-scan-full-history || github.event_name == 'schedule' }}
      runner:    ${{ inputs.runner }}
    secrets:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  sonarcloud:
    name: SonarCloud
    if: inputs.sonar-project-key != ''
    uses: orion-digital-solutions/.github/.github/workflows/sonarcloud.yml@main
    with:
      project-key:            ${{ inputs.sonar-project-key }}
      python-version:         ${{ inputs.python-version }}
      node-version:           ${{ inputs.node-version }}
      java-version:           ${{ inputs.java-version }}
      python-coverage-report: ${{ inputs.sonar-python-coverage-report }}
      js-coverage-report:     ${{ inputs.sonar-js-coverage-report }}
      runner:                 ${{ inputs.runner }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  license-check:
    name: License Compliance
    if: github.event_name != 'release'
    uses: orion-digital-solutions/.github/.github/workflows/license-compliance.yml@main
    with:
      forbidden-licenses: ${{ inputs.forbidden-licenses }}
      runner:             ${{ inputs.runner }}
    secrets: inherit

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 2 — Gated on Phase 1, push to main branch only
# ─────────────────────────────────────────────────────────────────────────────

  release-please:
    name: Release Please
    needs: [secret-scan, sonarcloud, license-check]
    if: >-
      always() &&
      inputs.release-type != '' &&
      github.event_name == 'push' &&
      github.ref_name == inputs.main-branch &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    uses: orion-digital-solutions/.github/.github/workflows/release-please.yml@main
    with:
      release-type:             ${{ inputs.release-type }}
      target-branch:            ${{ inputs.main-branch }}
      generate-sbom-on-release: true
      runner:                   ${{ inputs.runner }}
    secrets: inherit

  sbom:
    name: SBOM Generation
    needs: [secret-scan, license-check]
    if: >-
      always() &&
      (
        (github.event_name == 'push' && github.ref_name == inputs.main-branch) ||
        github.event_name == 'release'
      ) &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    uses: orion-digital-solutions/.github/.github/workflows/sbom.yml@main
    with:
      attach-to-release: ${{ github.event_name == 'release' }}
      runner:            ${{ inputs.runner }}
    secrets: inherit

# ─────────────────────────────────────────────────────────────────────────────
# FINAL — Detailed consolidated report (always runs, never fails itself)
# ─────────────────────────────────────────────────────────────────────────────

  report:
    name: CI Report
    needs: [secret-scan, sonarcloud, license-check, release-please, sbom]
    if: always()
    runs-on: ${{ inputs.runner }}

    steps:
      # ── Download artifacts from Phase 1 jobs ────────────────────────────
      - name: Download Gitleaks report
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-report
          path: ./reports/gitleaks
        continue-on-error: true   # artifact may not exist if job was skipped

      - name: Download license report
        uses: actions/download-artifact@v4
        with:
          name: license-report
          path: ./reports/license
        continue-on-error: true

      # ── Step 1: Fetch SonarCloud data + write shared env ────────────────
      # Expressions in this step are minimal so it stays well under 21k chars.
      - name: Fetch SonarCloud data
        id: sonar-fetch
        if: always()
        shell: bash
        env:
          RESULT_SONAR: ${{ needs.sonarcloud.result }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
          PROJECT_KEY:  ${{ inputs.sonar-project-key }}
        run: |
          set -uo pipefail
          SONAR_URL="https://sonarcloud.io"
          QG='{}'; MEASURES='{}'; ISSUES='{}'; HOTSPOT_DATA='{}'; QG_STATUS="UNKNOWN"

          if [ -n "${PROJECT_KEY:-}" ] && [ -n "${SONAR_TOKEN:-}" ] && [ "${RESULT_SONAR}" != "skipped" ]; then

            # Retry helper — retries up to 3 times with 5s backoff; returns '{}' on failure
            sonar_api() {
              local url="$1" attempt body http_code
              for attempt in 1 2 3; do
                body=$(curl -s --max-time 15 -w '\n%{http_code}' \
                  -H "Authorization: Bearer ${SONAR_TOKEN}" "$url" 2>/dev/null || true)
                http_code=$(echo "$body" | tail -1)
                body=$(echo "$body" | sed '$d')
                if [ "$http_code" = "200" ] && echo "$body" | jq . >/dev/null 2>&1; then
                  echo "$body"
                  return 0
                fi
                echo "::warning::SonarCloud API attempt $attempt failed (HTTP $http_code) for $url" >&2
                sleep 5
              done
              echo '{}'
            }

            # Poll /api/ce/component until the analysis task is SUCCESS or FAILED (max ~90s)
            echo "Polling SonarCloud for analysis processing completion..."
            for i in $(seq 1 18); do
              TASK_STATUS=$(curl -sf --max-time 10 \
                -H "Authorization: Bearer ${SONAR_TOKEN}" \
                "${SONAR_URL}/api/ce/component?component=${PROJECT_KEY}" \
                2>/dev/null | jq -r '.current.status // "UNKNOWN"' 2>/dev/null || echo "UNKNOWN")
              echo "  attempt $i — task status: ${TASK_STATUS}"
              if [ "$TASK_STATUS" = "SUCCESS" ] || [ "$TASK_STATUS" = "FAILED" ]; then
                break
              fi
              sleep 5
            done
            echo "Proceeding with API data fetch (final task status: ${TASK_STATUS:-UNKNOWN})"

            QG=$(sonar_api "${SONAR_URL}/api/qualitygates/project_status?projectKey=${PROJECT_KEY}")

            METRIC_KEYS="bugs,vulnerabilities,code_smells,coverage,duplicated_lines_density"
            METRIC_KEYS="${METRIC_KEYS},security_hotspots,ncloc,sqale_index"
            METRIC_KEYS="${METRIC_KEYS},reliability_rating,security_rating,sqale_rating"
            METRIC_KEYS="${METRIC_KEYS},new_bugs,new_vulnerabilities,new_code_smells"
            METRIC_KEYS="${METRIC_KEYS},new_coverage,new_security_hotspots,new_security_review_rating"
            MEASURES=$(sonar_api "${SONAR_URL}/api/measures/component?component=${PROJECT_KEY}&metricKeys=${METRIC_KEYS}")

            ISSUES=$(sonar_api "${SONAR_URL}/api/issues/search?componentKeys=${PROJECT_KEY}&statuses=OPEN,CONFIRMED,REOPENED&ps=15&s=SEVERITY&asc=false&facets=types,severities")

            HOTSPOT_DATA=$(sonar_api "${SONAR_URL}/api/hotspots/search?projectKey=${PROJECT_KEY}&ps=10&status=TO_REVIEW")

            QG_STATUS=$(echo "$QG" | jq -r '.projectStatus.status // "UNKNOWN"' 2>/dev/null || echo "UNKNOWN")
          fi

          # Persist to files so subsequent steps can read them without re-fetching
          mkdir -p ./sonar-data
          echo "$QG"           > ./sonar-data/qg.json
          echo "$MEASURES"     > ./sonar-data/measures.json
          echo "$ISSUES"       > ./sonar-data/issues.json
          echo "$HOTSPOT_DATA" > ./sonar-data/hotspots.json
          echo "QG_STATUS=${QG_STATUS}" >> "$GITHUB_ENV"

      # ── Step 2: Header + dashboard table ────────────────────────────────
      - name: Report — header and dashboard
        if: always()
        shell: bash
        env:
          RESULT_SECRET:   ${{ needs.secret-scan.result }}
          RESULT_SONAR:    ${{ needs.sonarcloud.result }}
          RESULT_LICENSE:  ${{ needs.license-check.result }}
          RESULT_RELEASE:  ${{ needs.release-please.result }}
          RESULT_SBOM:     ${{ needs.sbom.result }}
          RELEASE_CREATED: ${{ needs.release-please.outputs.release-created }}
          RELEASE_TAG:     ${{ needs.release-please.outputs.tag-name }}
          EVENT:           ${{ github.event_name }}
          REF:             ${{ github.ref_name }}
          SHA:             ${{ github.sha }}
          REPO:            ${{ github.repository }}
          RUN_ID:          ${{ github.run_id }}
          SERVER_URL:      ${{ github.server_url }}
          RUNNER_NAME:     ${{ inputs.runner }}
        run: |
          set -uo pipefail
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          SHA_SHORT="${SHA:0:7}"

          status_icon() {
            case "$1" in
              success)   echo "✅ Passed"    ;;
              failure)   echo "❌ Failed"    ;;
              cancelled) echo "🚫 Cancelled" ;;
              skipped)   echo "⏭️ Skipped"  ;;
              *)         echo "⬜ Unknown"   ;;
            esac
          }

          OVERALL_PASS=true
          for r in "$RESULT_SECRET" "$RESULT_SONAR" "$RESULT_LICENSE" "$RESULT_RELEASE" "$RESULT_SBOM"; do
            { [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; } && OVERALL_PASS=false && break
          done
          [ "$OVERALL_PASS" = "true" ] \
            && BANNER="## ✅ Orion CI — All Checks Passed" \
            || BANNER="## ❌ Orion CI — One or More Checks Failed"

          # One-line detail per stage
          GL_FILE="./reports/gitleaks/gitleaks-full-report.json"
          if   [ "$RESULT_SECRET" = "skipped" ]; then SD="Skipped"
          elif [ ! -f "$GL_FILE" ];              then SD="Report artifact unavailable"
          else
            N=$(jq '.findings | length' "$GL_FILE" 2>/dev/null || echo 0)
            [ "$N" -eq 0 ] && SD="No secrets detected" || SD="${N} secret(s) found — rotate credentials"
          fi

          if   [ "$RESULT_SONAR" = "skipped" ]; then SND="Skipped — no project key configured"
          elif [ "$RESULT_SONAR" = "success" ]; then SND="Quality Gate passed"
          elif [ "$RESULT_SONAR" = "failure" ]; then SND="Quality Gate failed or scan error"
          else SND="$(status_icon "$RESULT_SONAR")"
          fi

          LC_FILE="./reports/license/license-report.json"
          if   [ "$RESULT_LICENSE" = "skipped" ]; then LD="Skipped (release event)"
          elif [ ! -f "$LC_FILE" ];               then LD="Report artifact unavailable"
          else
            V=$(jq '.meta.violation_count // 0' "$LC_FILE" 2>/dev/null || echo 0)
            T=$(jq '.meta.total_packages  // 0' "$LC_FILE" 2>/dev/null || echo 0)
            R=$(jq '[.results[]?.Licenses[]? | select(.Category=="restricted")] | length' "$LC_FILE" 2>/dev/null || echo 0)
            if   [ "$V" -gt 0 ]; then LD="${V} forbidden license(s) in ${T} packages"
            elif [ "$R" -gt 0 ]; then LD="${R} restricted license(s) detected (${T} packages)"
            else LD="No violations (${T} packages scanned)"
            fi
          fi

          if   [ "$RESULT_RELEASE" = "skipped" ];        then RD="Skipped"
          elif [ "${RELEASE_CREATED:-}" = "true" ];       then RD="Released ${RELEASE_TAG}"
          elif [ "$RESULT_RELEASE" = "success" ];         then RD="No release created — PR may be pending"
          else RD="$(status_icon "$RESULT_RELEASE")"
          fi

          if   [ "$RESULT_SBOM" = "skipped" ]; then SBOMD="Skipped — only runs on push to main or release"
          elif [ "$RESULT_SBOM" = "success" ]; then SBOMD="SPDX + CycloneDX generated"
          else SBOMD="$(status_icon "$RESULT_SBOM")"
          fi

          if   [ "$RESULT_SONAR" = "skipped" ];   then SONAR_ST="⏭️ Skipped"
          elif [ "$RESULT_SONAR" = "success" ];  then SONAR_ST="✅ Passed"
          elif [ "$RESULT_SONAR" = "failure" ];  then SONAR_ST="❌ Failed"
          elif [ "$RESULT_SONAR" = "cancelled" ]; then SONAR_ST="🚫 Cancelled"
          else SONAR_ST="⬜ Unknown"
          fi

          REL_ST=$([ "${RELEASE_CREATED:-}" = "true" ] && echo "🚀 Released" || status_icon "$RESULT_RELEASE")

          {
            echo "${BANNER}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Trigger** | \`${EVENT}\` on \`${REF}\` |"
            echo "| **Commit** | [\`${SHA_SHORT}\`](${SERVER_URL}/${REPO}/commit/${SHA}) |"
            echo "| **Runner** | \`${RUNNER_NAME}\` |"
            echo "| **Run** | [View full run](${RUN_URL}) |"
            echo ""
            echo "### Pipeline Dashboard"
            echo ""
            echo "| Stage | Status | Details |"
            echo "|-------|--------|---------|"
            echo "| 🔐 Secret Scanning | $(status_icon "$RESULT_SECRET") | ${SD} |"
            echo "| 🔍 SonarCloud | ${SONAR_ST} | ${SND} |"
            echo "| ⚖️ License Compliance | $(status_icon "$RESULT_LICENSE") | ${LD} |"
            echo "| 🏷️ Release Please | ${REL_ST} | ${RD} |"
            echo "| 📦 SBOM | $(status_icon "$RESULT_SBOM") | ${SBOMD} |"
            echo ""
            echo "---"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Step 3: Secret Scanning section ─────────────────────────────────
      - name: Report — secret scanning
        if: always()
        shell: bash
        env:
          RESULT_SECRET: ${{ needs.secret-scan.result }}
          REPO:          ${{ github.repository }}
          SERVER_URL:    ${{ github.server_url }}
        run: |
          set -uo pipefail
          GL_FILE="./reports/gitleaks/gitleaks-full-report.json"

          status_icon() {
            case "$1" in
              success)   echo "✅ Passed"    ;;
              failure)   echo "❌ Failed"    ;;
              cancelled) echo "🚫 Cancelled" ;;
              skipped)   echo "⏭️ Skipped"  ;;
              *)         echo "⬜ Unknown"   ;;
            esac
          }

          {
            echo "### 🔐 Secret Scanning (Gitleaks)"
            echo ""

            if [ "$RESULT_SECRET" = "skipped" ]; then
              echo "⏭️ _Skipped_"
            elif [ -f "$GL_FILE" ]; then
              SCAN_TYPE=$(jq -r '.meta.scan_type // "unknown"' "$GL_FILE" 2>/dev/null || echo "unknown")
              GL_VER=$(jq    -r '.meta.gitleaks_version // ""'  "$GL_FILE" 2>/dev/null || echo "")
              FC=$(jq '.findings | length' "$GL_FILE" 2>/dev/null || echo 0)

              [ "$FC" -eq 0 ] \
                && echo "**Status: ✅ No secrets detected**" \
                || echo "**Status: ❌ ${FC} secret(s) detected — rotate credentials immediately**"
              echo ""
              echo "> Scan type: \`${SCAN_TYPE}\` | Gitleaks \`${GL_VER}\`"
              echo ""

              if [ "$FC" -gt 0 ]; then
                echo "| Severity | File | Line | Rule | Description | Commit |"
                echo "|----------|------|------|------|-------------|--------|"
                jq -r --arg base "${SERVER_URL}/${REPO}/commit/" '
                  .findings[] |
                  ( .Tags // ["UNKNOWN"] | if type=="array" then .[0] else . end ) as $sev |
                  ( .Description // "—" | gsub("[|]";"\\|") | .[0:80] ) as $desc |
                  "| \($sev) | `\(.File // "unknown")` | \(.StartLine // "—") | `\(.RuleID // "—")` | \($desc) | [`\(.Commit[:7] // "—")`](\($base)\(.Commit // "")) |"
                ' "$GL_FILE" 2>/dev/null | head -20
                TOTAL=$(jq '.findings | length' "$GL_FILE" 2>/dev/null || echo 0)
                [ "$TOTAL" -gt 20 ] && echo "" && echo "_...and $((TOTAL-20)) more. Download the \`gitleaks-report\` artifact for the full list._"
                echo ""
                echo "> **Remediation:** Rotate any exposed credentials immediately."
                echo "> Remove secrets from git history using [\`git filter-repo\`](https://github.com/newren/git-filter-repo)."
                echo "> If a finding is a false positive, add it to \`.gitleaks.toml\` in your repository root."
              fi
            else
              echo "$(status_icon "$RESULT_SECRET") _(report artifact not available)_"
            fi

            echo ""
            echo "---"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Step 4: SonarCloud section ───────────────────────────────────────
      - name: Report — SonarCloud
        if: always()
        shell: bash
        env:
          RESULT_SONAR: ${{ needs.sonarcloud.result }}
          PROJECT_KEY:  ${{ inputs.sonar-project-key }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
          REPO:         ${{ github.repository }}
          SERVER_URL:   ${{ github.server_url }}
          SHA:          ${{ github.sha }}
        run: |
          set -uo pipefail
          SONAR_URL="https://sonarcloud.io"

          rating_badge() {
            case "${1%.*}" in
              1) echo "🟢 A" ;; 2) echo "🟡 B" ;; 3) echo "🟠 C" ;;
              4) echo "🔴 D" ;; 5) echo "🔴 E" ;; *) echo "—"    ;;
            esac
          }
          fmt_number() { echo "$1" | awk '{printf "%\047d\n",$1}' 2>/dev/null || echo "$1"; }
          fmt_debt() {
            local m="$1"
            echo "$m" | grep -qE '^[0-9]+$' || { echo "—"; return; }
            local d=$(( m/480 )) h=$(( (m%480)/60 )) r=$(( m%60 )) o=""
            [ $d -gt 0 ] && o="${d}d "
            [ $h -gt 0 ] && o="${o}${h}h "
            [ $r -gt 0 ] && o="${o}${r}min"
            echo "${o%% }" | grep -q . && echo "${o%% }" || echo "< 1min"
          }
          # Overall metric value (ignores new-code period — always returns the total)
          m() {
            local v
            v=$(jq -r --arg k "$1" \
              '.component.measures[]? | select(.metric==$k) | .value // ""' \
              ./sonar-data/measures.json 2>/dev/null || true)
            [ -n "$v" ] && echo "$v" || echo "N/A"
          }
          # New-code period value (only set when a new-code period exists)
          mn() {
            local v
            v=$(jq -r --arg k "$1" \
              '.component.measures[]? | select(.metric==$k) | .periods[0].value // ""' \
              ./sonar-data/measures.json 2>/dev/null || true)
            [ -n "$v" ] && echo "$v" || echo "N/A"
          }

          {
            echo "### 🔍 SonarCloud Code Quality"
            echo ""

            if [ "$RESULT_SONAR" = "skipped" ]; then
              echo "⏭️ _Skipped — no \`sonar-project-key\` configured_"
            elif [ -z "${PROJECT_KEY:-}" ] || [ -z "${SONAR_TOKEN:-}" ]; then
              echo "$([ "$RESULT_SONAR" = "success" ] && echo "✅" || echo "⚠️") _SonarCloud credentials not available in report step — check \`SONAR_TOKEN\` secret and \`sonar-project-key\` input_"
            else
              QG_STATUS="${QG_STATUS:-UNKNOWN}"
              [ "$QG_STATUS" = "OK" ] && QG_ICON="✅ Passed" || QG_ICON="❌ Failed"

              echo "**Quality Gate: ${QG_ICON}** | [View in SonarCloud](${SONAR_URL}/project/overview?id=${PROJECT_KEY})"
              echo ""

              FAILED_CONDS=$(jq -r '
                .projectStatus.conditions[]? |
                select(.status=="ERROR") |
                "| \(.metricKey | gsub("_";" ") | ascii_upcase) | \(.actualValue) | \(.comparator) \(.errorThreshold) |"
              ' ./sonar-data/qg.json 2>/dev/null || true)

              if [ -n "$FAILED_CONDS" ]; then
                echo "<details open><summary>❌ Failed Quality Gate Conditions</summary>"
                echo ""
                echo "| Metric | Actual Value | Threshold |"
                echo "|--------|-------------|-----------|"
                echo "$FAILED_CONDS"
                echo ""
                echo "</details>"
                echo ""
              fi

              BUGS=$(m bugs);      REL_R=$(m reliability_rating)
              VULNS=$(m vulnerabilities); SEC_R=$(m security_rating)
              SMELLS=$(m code_smells);   MNT_R=$(m sqale_rating)
              COV=$(m coverage);   DUP=$(m duplicated_lines_density)
              HS=$(m security_hotspots); LOC=$(m ncloc); DEBT=$(m sqale_index)

              echo "#### Overall Code Metrics"
              echo ""
              echo "| Metric | Value | Rating |"
              echo "|--------|-------|--------|"
              echo "| 🐛 Bugs | ${BUGS} | $(rating_badge "$REL_R") |"
              echo "| 🔒 Vulnerabilities | ${VULNS} | $(rating_badge "$SEC_R") |"
              echo "| 🔥 Security Hotspots | ${HS} | — |"
              echo "| 🧹 Code Smells | ${SMELLS} | $(rating_badge "$MNT_R") |"
              [ "$COV"  != "N/A" ] && echo "| 📊 Coverage | ${COV}% | — |"
              [ "$DUP"  != "N/A" ] && echo "| 🔄 Duplications | ${DUP}% | — |"
              [ "$LOC"  != "N/A" ] && echo "| 📝 Lines of Code | $(fmt_number "$LOC") | — |"
              [ "$DEBT" != "N/A" ] && echo "| 💳 Technical Debt | $(fmt_debt "$DEBT") | — |"
              echo ""

              NB=$(mn new_bugs); NV=$(mn new_vulnerabilities); NS=$(mn new_code_smells)
              NC=$(mn new_coverage); NH=$(mn new_security_hotspots)
              HAS_NEW=false
              for v in "$NB" "$NV" "$NS" "$NC" "$NH"; do [ "$v" != "N/A" ] && HAS_NEW=true && break; done

              if [ "$HAS_NEW" = "true" ]; then
                echo "#### New Code Metrics"
                echo ""
                echo "| Metric | Value |"
                echo "|--------|-------|"
                [ "$NB" != "N/A" ] && echo "| 🐛 New Bugs | ${NB} |"
                [ "$NV" != "N/A" ] && echo "| 🔒 New Vulnerabilities | ${NV} |"
                [ "$NS" != "N/A" ] && echo "| 🧹 New Code Smells | ${NS} |"
                [ "$NC" != "N/A" ] && echo "| 📊 New Coverage | ${NC}% |"
                [ "$NH" != "N/A" ] && echo "| 🔥 New Security Hotspots | ${NH} |"
                echo ""
              fi

              SEV_FACET=$(jq -r '
                (.facets // [])[] | select(.property=="severities") |
                .values[] | "| \(.val) | \(.count) |"
              ' ./sonar-data/issues.json 2>/dev/null || true)
              if [ -n "$SEV_FACET" ]; then
                echo "<details><summary>📊 Issue Severity Breakdown</summary>"
                echo ""
                echo "| Severity | Count |"
                echo "|----------|-------|"
                echo "$SEV_FACET"
                echo ""
                echo "</details>"
                echo ""
              fi

              IC=$(jq '.issues | length' ./sonar-data/issues.json 2>/dev/null || echo 0)
              IT=$(jq '.total // 0'     ./sonar-data/issues.json 2>/dev/null || echo 0)
              REPO_URL="${SERVER_URL}/${REPO}"
              if [ "${IC:-0}" -eq 0 ] && [ "$QG_STATUS" != "OK" ]; then
                echo "> No individual issues were returned from the API. The Quality Gate may have failed due to metric thresholds (e.g. coverage, ratings). Check the [SonarCloud dashboard](${SONAR_URL}/project/issues?id=${PROJECT_KEY}) for details."
                echo ""
              fi
              if [ "${IC:-0}" -gt 0 ]; then
                echo "<details><summary>🔎 Top Issues (showing up to 15 of ${IT})</summary>"
                echo ""
                echo "| Severity | Type | Message | Location | Effort |"
                echo "|----------|------|---------|----------|--------|"
                jq -r --arg repo_url "${REPO_URL}" --arg sha "${SHA}" '
                  .issues[]? |
                  (.component | split(":") | last) as $f |
                  (.textRange.startLine // "—" | tostring) as $l |
                  (.effort // "—") as $e |
                  (.message | gsub("[|]";"\\|") | .[0:90]) as $m |
                  if $l != "—" then
                    "| \(.severity) | \(.type | gsub("_";" ")) | \($m) | [`\($f):\($l)`](\($repo_url)/blob/\($sha)/\($f)#L\($l)) | \($e) |"
                  else
                    "| \(.severity) | \(.type | gsub("_";" ")) | \($m) | `\($f)` | \($e) |"
                  end
                ' ./sonar-data/issues.json 2>/dev/null | head -15
                echo ""
                [ "${IT:-0}" -gt 15 ] && echo "_...and $((IT-15)) more. [View all in SonarCloud](${SONAR_URL}/project/issues?id=${PROJECT_KEY})._" && echo ""
                echo "</details>"
                echo ""
              fi

              HC=$(jq '.hotspots | length'  ./sonar-data/hotspots.json 2>/dev/null || echo 0)
              HT=$(jq '.paging.total // 0'  ./sonar-data/hotspots.json 2>/dev/null || echo 0)
              if [ "${HC:-0}" -gt 0 ]; then
                echo "<details><summary>🔥 Security Hotspots Requiring Review (${HT} total)</summary>"
                echo ""
                echo "| Probability | Category | Message | Location |"
                echo "|-------------|----------|---------|----------|"
                jq -r --arg repo_url "${REPO_URL}" --arg sha "${SHA}" '
                  .hotspots[]? |
                  (.component | split(":") | last) as $f |
                  (.textRange.startLine // "—" | tostring) as $l |
                  (.message | gsub("[|]";"\\|") | .[0:90]) as $m |
                  if $l != "—" then
                    "| \(.vulnerabilityProbability) | \(.securityCategory | gsub("-";" ") | ascii_upcase) | \($m) | [`\($f):\($l)`](\($repo_url)/blob/\($sha)/\($f)#L\($l)) |"
                  else
                    "| \(.vulnerabilityProbability) | \(.securityCategory | gsub("-";" ") | ascii_upcase) | \($m) | `\($f)` |"
                  end
                ' ./sonar-data/hotspots.json 2>/dev/null | head -10
                echo ""
                [ "${HT:-0}" -gt 10 ] && echo "_...and $((HT-10)) more. [Review all hotspots](${SONAR_URL}/project/security_hotspots?id=${PROJECT_KEY})._" && echo ""
                echo "</details>"
                echo ""
              fi
            fi

            echo ""
            echo "---"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Step 5: License Compliance section ──────────────────────────────
      - name: Report — license compliance
        if: always()
        shell: bash
        env:
          RESULT_LICENSE: ${{ needs.license-check.result }}
        run: |
          set -uo pipefail
          LC_FILE="./reports/license/license-report.json"

          status_icon() {
            case "$1" in
              success)   echo "✅ Passed"    ;;
              failure)   echo "❌ Failed"    ;;
              cancelled) echo "🚫 Cancelled" ;;
              skipped)   echo "⏭️ Skipped"  ;;
              *)         echo "⬜ Unknown"   ;;
            esac
          }

          {
            echo "### ⚖️ License Compliance (Trivy)"
            echo ""

            if [ "$RESULT_LICENSE" = "skipped" ]; then
              echo "⏭️ _Skipped (release event — no new dependencies introduced)_"
            elif [ -f "$LC_FILE" ]; then
              TOTAL_PKGS=$(jq '.meta.total_packages // 0'    "$LC_FILE" 2>/dev/null || echo 0)
              VIOLATIONS=$(jq '.meta.violation_count // 0'   "$LC_FILE" 2>/dev/null || echo 0)
              FORBIDDEN_CFG=$(jq -r '(.meta.forbidden_licenses // []) | join(", ")' "$LC_FILE" 2>/dev/null || echo "—")
              RESTRICTED_COUNT=$(jq '[.results[]?.Licenses[]? | select(.Category=="restricted")] | length' "$LC_FILE" 2>/dev/null || echo 0)

              # Status derives from the actual job result, not just the violation count.
              # Trivy can fail due to restricted (non-forbidden) licenses too.
              if   [ "$RESULT_LICENSE" = "failure" ] && [ "$VIOLATIONS" -gt 0 ]; then
                echo "**Status: ❌ ${VIOLATIONS} forbidden license violation(s) detected** (${TOTAL_PKGS} packages scanned)"
              elif [ "$RESULT_LICENSE" = "failure" ] && [ "$RESTRICTED_COUNT" -gt 0 ]; then
                echo "**Status: ⚠️ Job failed — ${RESTRICTED_COUNT} restricted license(s) detected** (${TOTAL_PKGS} packages scanned)"
                echo ""
                echo "> Trivy flagged packages with **restricted** licenses (e.g. LGPL). These are not in the"
                echo "> forbidden list but may require review depending on your project's usage. Check with legal"
                echo "> if you distribute software containing LGPL components."
              elif [ "$RESULT_LICENSE" = "failure" ]; then
                echo "**Status: ❌ License scan failed** (${TOTAL_PKGS} packages scanned)"
              elif [ "$VIOLATIONS" -eq 0 ]; then
                echo "**Status: ✅ No forbidden violations detected** (${TOTAL_PKGS} packages scanned)"
              else
                echo "**Status: ❌ ${VIOLATIONS} violation(s) detected** (${TOTAL_PKGS} packages scanned)"
              fi
              echo ""
              [ -n "$FORBIDDEN_CFG" ] && [ "$FORBIDDEN_CFG" != "—" ] \
                && echo "> Forbidden licenses configured: \`${FORBIDDEN_CFG}\`" \
                && echo ""

              if [ "$VIOLATIONS" -gt 0 ]; then
                echo "#### Forbidden License Violations"
                echo ""
                echo "| Package | Version | License | Severity | Source File |"
                echo "|---------|---------|---------|----------|-------------|"
                jq -r '
                  .results[]? | .Target as $t | .Licenses[]? |
                  select(.Category=="forbidden") |
                  "| `\(.PkgName // "unknown")` | \(.PkgVersion // "—") | \(.Name) | \(.Severity // "—") | `\($t)` |"
                ' "$LC_FILE" 2>/dev/null | head -25
                VTOTAL=$(jq '[.results[]?.Licenses[]? | select(.Category=="forbidden")] | length' "$LC_FILE" 2>/dev/null || echo 0)
                [ "$VTOTAL" -gt 25 ] && echo "" && echo "_...and $((VTOTAL-25)) more. Download the \`license-report\` artifact for the full list._"
                echo ""
              fi

              if [ "$RESTRICTED_COUNT" -gt 0 ]; then
                echo "<details><summary>⚠️ Restricted Licenses Detected (${RESTRICTED_COUNT} — review required)</summary>"
                echo ""
                echo "| Package | Version | License | Severity | Source File |"
                echo "|---------|---------|---------|----------|-------------|"
                jq -r '
                  .results[]? | .Target as $t | .Licenses[]? |
                  select(.Category=="restricted") |
                  "| `\(.PkgName // "unknown")` | \(.PkgVersion // "—") | \(.Name) | \(.Severity // "—") | `\($t)` |"
                ' "$LC_FILE" 2>/dev/null | head -25
                RTOTAL=$(jq '[.results[]?.Licenses[]? | select(.Category=="restricted")] | length' "$LC_FILE" 2>/dev/null || echo 0)
                [ "$RTOTAL" -gt 25 ] && echo "" && echo "_...and $((RTOTAL-25)) more. Download the \`license-report\` artifact for the full list._"
                echo ""
                echo "</details>"
                echo ""
              fi

              ALL_LIC=$(jq -r '
                [.results[]?.Licenses[]? | {n:.Name, c:(.Category//"unknown")}] |
                unique_by(.n) | sort_by(.n) | .[] |
                "| `\(.n)` | \(.c) |"
              ' "$LC_FILE" 2>/dev/null | head -60)

              if [ -n "$ALL_LIC" ]; then
                echo "<details><summary>📋 Full License Inventory</summary>"
                echo ""
                echo "| License | Category |"
                echo "|---------|----------|"
                echo "$ALL_LIC"
                UNIQ=$(jq '[.results[]?.Licenses[]?.Name] | unique | length' "$LC_FILE" 2>/dev/null || echo "?")
                [ "${UNIQ:-0}" -gt 60 ] && echo "" && echo "_...and more. Download the \`license-report\` artifact for the complete list._"
                echo ""
                echo "</details>"
              fi
            else
              echo "$(status_icon "$RESULT_LICENSE") _(report artifact not available)_"
            fi

            echo ""
            echo "---"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Step 6: Release Please + SBOM + footer ───────────────────────────
      - name: Report — release and SBOM
        if: always()
        shell: bash
        env:
          RESULT_RELEASE:  ${{ needs.release-please.result }}
          RESULT_SBOM:     ${{ needs.sbom.result }}
          RELEASE_CREATED: ${{ needs.release-please.outputs.release-created }}
          RELEASE_TAG:     ${{ needs.release-please.outputs.tag-name }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
          RELEASE_TYPE:    ${{ inputs.release-type }}
          MAIN_BRANCH:     ${{ inputs.main-branch }}
          REPO:            ${{ github.repository }}
          SERVER_URL:      ${{ github.server_url }}
        run: |
          set -uo pipefail

          status_icon() {
            case "$1" in
              success)   echo "✅ Passed"    ;;
              failure)   echo "❌ Failed"    ;;
              cancelled) echo "🚫 Cancelled" ;;
              skipped)   echo "⏭️ Skipped"  ;;
              *)         echo "⬜ Unknown"   ;;
            esac
          }

          {
            echo "### 🏷️ Release Please"
            echo ""

            if [ "$RESULT_RELEASE" = "skipped" ]; then
              echo "⏭️ _Skipped_"
              echo ""
              [ -z "${RELEASE_TYPE:-}" ] \
                && echo "> No \`release-type\` configured for this repository." \
                || echo "> Only runs on push to \`${MAIN_BRANCH}\`."
            elif [ "${RELEASE_CREATED:-}" = "true" ]; then
              echo "**🚀 Release created: [\`${RELEASE_TAG}\`](${SERVER_URL}/${REPO}/releases/tag/${RELEASE_TAG})**"
              echo ""
              echo "| Field | Value |"
              echo "|-------|-------|"
              echo "| Version | \`${RELEASE_VERSION}\` |"
              echo "| Tag | \`${RELEASE_TAG}\` |"
              echo "| Release notes | [${RELEASE_TAG}](${SERVER_URL}/${REPO}/releases/tag/${RELEASE_TAG}) |"
              echo "| SBOM | Attached to release assets |"
            else
              echo "$(status_icon "$RESULT_RELEASE")"
              echo ""
              echo "> No release created this run — Release PR may be open and waiting for merge."
              echo "> [View open Release PRs](${SERVER_URL}/${REPO}/pulls?q=is%3Aopen+label%3Autorelease%3Apending)"
            fi

            echo ""
            echo "---"
            echo ""
            echo "### 📦 SBOM Generation"
            echo ""

            if [ "$RESULT_SBOM" = "skipped" ]; then
              echo "⏭️ _Skipped — only runs on push to \`${MAIN_BRANCH}\` or release events_"
            else
              echo "$(status_icon "$RESULT_SBOM")"
              echo ""
              echo "| Format | Artifact |"
              echo "|--------|----------|"
              echo "| SPDX JSON | \`sbom-spdx.json\` |"
              echo "| CycloneDX JSON | \`sbom-cyclonedx.json\` |"
              if [ "${RELEASE_CREATED:-}" = "true" ]; then
                echo ""
                echo "> Both files attached to [Release ${RELEASE_TAG}](${SERVER_URL}/${REPO}/releases/tag/${RELEASE_TAG})."
              fi
            fi

            echo ""
            echo "---"
            echo ""
            echo "<sub>Report generated · [Orion Digital Solutions](https://www.orion360.com/)</sub>"
          } >> "$GITHUB_STEP_SUMMARY"
