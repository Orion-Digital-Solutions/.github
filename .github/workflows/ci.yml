name: Orion CI Orchestrator (Reusable)

# Central CI orchestrator — single source of truth for all quality, security,
# and release workflows across every Orion Digital Solutions repository.
#
# ── Caller usage (add ONE file to each project repo) ─────────────────────────
#
#   uses: orion-digital-solutions/.github/.github/workflows/ci.yml@main
#   with:
#     sonar-project-key: orion-digital-solutions_my-repo
#     release-type: python
#   secrets: inherit
#
# ── Execution model ───────────────────────────────────────────────────────────
#
#   Phase 1 — parallel scans (fast feedback, run on every event):
#     secret-scan  ──┐
#     sonarcloud   ──┼──► all must pass
#     license      ──┘
#
#   Phase 2 — gated on Phase 1 (push to main branch only):
#     release-please  (opens/merges release PR)
#     sbom            (generates SBOM artifacts — independent of release-please)
#
#   Final — always runs:
#     report  (detailed consolidated markdown summary — queries SonarCloud API,
#              parses Gitleaks JSON and license JSON artifacts)
#
# ── What runs and when ────────────────────────────────────────────────────────
#   pull_request     →  Phase 1 only
#   push (main)      →  Phase 1 + Phase 2
#   release created  →  SBOM only
#   schedule         →  Phase 1 only (full-history secret + license scans)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      sonar-project-key:
        description: "SonarCloud project key (orion-digital-solutions_<repo>). Leave blank to skip."
        required: false
        type: string
        default: ""

      sonar-python-coverage-report:
        description: "Path to Python XML coverage report (e.g. coverage.xml)"
        required: false
        type: string
        default: ""

      sonar-js-coverage-report:
        description: "Path to JS/TS LCOV coverage report (e.g. coverage/lcov.info)"
        required: false
        type: string
        default: ""

      python-version:
        description: "Python version to set up (e.g. '3.11'). Leave blank to skip."
        required: false
        type: string
        default: ""

      node-version:
        description: "Node.js version to set up (e.g. '20'). Leave blank to skip."
        required: false
        type: string
        default: ""

      java-version:
        description: "Java version to set up (e.g. '17'). Leave blank to skip."
        required: false
        type: string
        default: ""

      release-type:
        description: "Release Please release type (python, node, java, dotnet, go, simple). Leave blank to skip."
        required: false
        type: string
        default: ""

      main-branch:
        description: "Name of the default/main branch"
        required: false
        type: string
        default: "main"

      forbidden-licenses:
        description: "Comma-separated SPDX license IDs to treat as violations (overrides org default)"
        required: false
        type: string
        default: ""

      secret-scan-full-history:
        description: "Force a full git history secret scan"
        required: false
        type: boolean
        default: false

      runner:
        description: "GitHub Actions runner label"
        required: false
        type: string
        default: "ubuntu-latest"

    outputs:
      release-created:
        description: "true if a new GitHub Release was created"
        value: ${{ jobs.release-please.outputs.release-created }}
      release-tag:
        description: "Git tag of the new release (e.g. v1.4.0)"
        value: ${{ jobs.release-please.outputs.tag-name }}
      release-version:
        description: "Version string of the new release (e.g. 1.4.0)"
        value: ${{ jobs.release-please.outputs.version }}

    secrets:
      SONAR_TOKEN:
        description: "SonarCloud token (org-level secret)"
        required: false
      GITLEAKS_LICENSE:
        description: "Gitleaks license key (optional)"
        required: false

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 1 — Parallel security & quality scans
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  secret-scan:
    name: Secret Scanning
    uses: orion-digital-solutions/.github/.github/workflows/secret-scanning.yml@main
    with:
      full-scan: ${{ inputs.secret-scan-full-history || github.event_name == 'schedule' }}
      runner:    ${{ inputs.runner }}
    secrets:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  sonarcloud:
    name: SonarCloud
    if: inputs.sonar-project-key != ''
    uses: orion-digital-solutions/.github/.github/workflows/sonarcloud.yml@main
    with:
      project-key:            ${{ inputs.sonar-project-key }}
      python-version:         ${{ inputs.python-version }}
      node-version:           ${{ inputs.node-version }}
      java-version:           ${{ inputs.java-version }}
      python-coverage-report: ${{ inputs.sonar-python-coverage-report }}
      js-coverage-report:     ${{ inputs.sonar-js-coverage-report }}
      runner:                 ${{ inputs.runner }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  license-check:
    name: License Compliance
    if: github.event_name != 'release'
    uses: orion-digital-solutions/.github/.github/workflows/license-compliance.yml@main
    with:
      forbidden-licenses: ${{ inputs.forbidden-licenses }}
      runner:             ${{ inputs.runner }}
    secrets: inherit

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 2 — Gated on Phase 1, push to main branch only
# ─────────────────────────────────────────────────────────────────────────────

  release-please:
    name: Release Please
    needs: [secret-scan, sonarcloud, license-check]
    if: >-
      always() &&
      inputs.release-type != '' &&
      github.event_name == 'push' &&
      github.ref_name == inputs.main-branch &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    uses: orion-digital-solutions/.github/.github/workflows/release-please.yml@main
    with:
      release-type:             ${{ inputs.release-type }}
      target-branch:            ${{ inputs.main-branch }}
      generate-sbom-on-release: true
      runner:                   ${{ inputs.runner }}
    secrets: inherit

  sbom:
    name: SBOM Generation
    needs: [secret-scan, license-check]
    if: >-
      always() &&
      (
        (github.event_name == 'push' && github.ref_name == inputs.main-branch) ||
        github.event_name == 'release'
      ) &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    uses: orion-digital-solutions/.github/.github/workflows/sbom.yml@main
    with:
      attach-to-release: ${{ github.event_name == 'release' }}
      runner:            ${{ inputs.runner }}
    secrets: inherit

# ─────────────────────────────────────────────────────────────────────────────
# FINAL — Detailed consolidated report (always runs, never fails itself)
# ─────────────────────────────────────────────────────────────────────────────

  report:
    name: CI Report
    needs: [secret-scan, sonarcloud, license-check, release-please, sbom]
    if: always()
    runs-on: ${{ inputs.runner }}

    steps:
      # ── Download artifacts from Phase 1 jobs ────────────────────────────
      - name: Download Gitleaks report
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-report
          path: ./reports/gitleaks
        continue-on-error: true   # artifact may not exist if job was skipped

      - name: Download license report
        uses: actions/download-artifact@v4
        with:
          name: license-report
          path: ./reports/license
        continue-on-error: true

      # ── Build detailed report ────────────────────────────────────────────
      - name: Generate detailed CI report
        shell: bash
        env:
          # ── Job results ──────────────────────────────────────────────────
          RESULT_SECRET:    ${{ needs.secret-scan.result }}
          RESULT_SONAR:     ${{ needs.sonarcloud.result }}
          RESULT_LICENSE:   ${{ needs.license-check.result }}
          RESULT_RELEASE:   ${{ needs.release-please.result }}
          RESULT_SBOM:      ${{ needs.sbom.result }}
          RELEASE_CREATED:  ${{ needs.release-please.outputs.release-created }}
          RELEASE_TAG:      ${{ needs.release-please.outputs.tag-name }}
          RELEASE_VERSION:  ${{ needs.release-please.outputs.version }}
          # ── SonarCloud API ───────────────────────────────────────────────
          SONAR_TOKEN:      ${{ secrets.SONAR_TOKEN }}
          PROJECT_KEY:      ${{ inputs.sonar-project-key }}
          # ── Run context ──────────────────────────────────────────────────
          EVENT:            ${{ github.event_name }}
          REF:              ${{ github.ref_name }}
          SHA:              ${{ github.sha }}
          REPO:             ${{ github.repository }}
          RUN_ID:           ${{ github.run_id }}
          SERVER_URL:       ${{ github.server_url }}
          RUNNER_NAME:      ${{ inputs.runner }}
        run: |
          # -e removed intentionally: each section handles its own errors so one
          # failed API call cannot prevent the rest of the report from rendering.
          set -uo pipefail

          REPORT_START=$SECONDS
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          SHA_SHORT="${SHA:0:7}"

          # ────────────────────────────────────────────────────────────────
          # Helper functions
          # ────────────────────────────────────────────────────────────────
          status_icon() {
            case "$1" in
              success)   echo "✅ Passed"    ;;
              failure)   echo "❌ Failed"    ;;
              cancelled) echo "🚫 Cancelled" ;;
              skipped)   echo "⏭️ Skipped"  ;;
              *)         echo "⬜ Unknown"   ;;
            esac
          }

          rating_badge() {
            case "${1%.*}" in
              1) echo "🟢 A" ;; 2) echo "🟡 B" ;; 3) echo "🟠 C" ;;
              4) echo "🔴 D" ;; 5) echo "🔴 E" ;; *)  echo "—"   ;;
            esac
          }

          fmt_number() {
            echo "$1" | awk '{ printf "%\047d\n", $1 }' 2>/dev/null || echo "$1"
          }

          # Convert minutes (sqale_index) to human-readable debt string
          fmt_debt() {
            local mins="$1"
            if ! echo "$mins" | grep -qE '^[0-9]+$'; then echo "—"; return; fi
            local days=$(( mins / 480 ))
            local hrs=$(( (mins % 480) / 60 ))
            local rem=$(( mins % 60 ))
            local out=""
            [ "$days" -gt 0 ] && out="${days}d "
            [ "$hrs"  -gt 0 ] && out="${out}${hrs}h "
            [ "$rem"  -gt 0 ] && out="${out}${rem}min"
            out="${out%% }"
            echo "${out:-< 1min}"
          }

          # One-line detail string per stage for the dashboard table
          secret_detail() {
            local f="./reports/gitleaks/gitleaks-full-report.json"
            [ "$RESULT_SECRET" = "skipped"   ] && echo "Skipped" && return
            [ ! -f "$f"                       ] && echo "Report artifact unavailable" && return
            local n; n=$(jq '.findings | length' "$f" 2>/dev/null || echo 0)
            [ "$n" -eq 0 ] && echo "No secrets detected" || echo "${n} secret(s) found — rotate credentials"
          }

          sonar_detail() {
            [ "$RESULT_SONAR" = "skipped" ] && echo "Skipped — no project key configured" && return
            [ -z "${PROJECT_KEY:-}" ] || [ -z "${SONAR_TOKEN:-}" ] && echo "Token or project key unavailable" && return
            local qs; qs=$(echo "${QG_STATUS:-UNKNOWN}")
            [ "$qs" = "OK" ] && echo "Quality Gate passed" || echo "Quality Gate failed"
          }

          license_detail() {
            local f="./reports/license/license-report.json"
            [ "$RESULT_LICENSE" = "skipped" ] && echo "Skipped (release event)" && return
            [ ! -f "$f" ] && echo "Report artifact unavailable" && return
            local v t
            v=$(jq '.meta.violation_count // 0' "$f" 2>/dev/null || echo 0)
            t=$(jq '.meta.total_packages  // 0' "$f" 2>/dev/null || echo 0)
            [ "$v" -eq 0 ] && echo "No violations (${t} packages scanned)" || echo "${v} violation(s) in ${t} packages"
          }

          release_detail() {
            [ "$RESULT_RELEASE" = "skipped"       ] && echo "Skipped" && return
            [ "${RELEASE_CREATED:-}" = "true"      ] && echo "Released ${RELEASE_TAG}" && return
            [ "$RESULT_RELEASE"  = "success"       ] && echo "No release created — PR may be pending" && return
            status_icon "$RESULT_RELEASE"
          }

          sbom_detail() {
            [ "$RESULT_SBOM" = "skipped" ] && echo "Skipped — only runs on push to main or release" && return
            [ "$RESULT_SBOM" = "success" ] && echo "SPDX + CycloneDX generated" && return
            status_icon "$RESULT_SBOM"
          }

          # ────────────────────────────────────────────────────────────────
          # Pre-fetch SonarCloud data (needed by both header detail and body)
          # ────────────────────────────────────────────────────────────────
          QG='{}'
          MEASURES='{}'
          ISSUES='{}'
          HOTSPOT_DATA='{}'
          QG_STATUS="UNKNOWN"

          if [ -n "${PROJECT_KEY:-}" ] && [ -n "${SONAR_TOKEN:-}" ] && [ "$RESULT_SONAR" != "skipped" ]; then
            SONAR_URL="https://sonarcloud.io"

            QG=$(curl -sf --max-time 15 \
              -H "Authorization: Bearer ${SONAR_TOKEN}" \
              "${SONAR_URL}/api/qualitygates/project_status?projectKey=${PROJECT_KEY}" \
              2>/dev/null || echo '{}')

            METRIC_KEYS="bugs,vulnerabilities,code_smells,coverage,duplicated_lines_density,security_hotspots,ncloc,sqale_index,reliability_rating,security_rating,sqale_rating,new_bugs,new_vulnerabilities,new_code_smells,new_coverage,new_security_hotspots,new_security_review_rating"
            MEASURES=$(curl -sf --max-time 15 \
              -H "Authorization: Bearer ${SONAR_TOKEN}" \
              "${SONAR_URL}/api/measures/component?component=${PROJECT_KEY}&metricKeys=${METRIC_KEYS}" \
              2>/dev/null || echo '{}')

            ISSUES=$(curl -sf --max-time 15 \
              -H "Authorization: Bearer ${SONAR_TOKEN}" \
              "${SONAR_URL}/api/issues/search?componentKeys=${PROJECT_KEY}&statuses=OPEN,CONFIRMED,REOPENED&ps=15&s=SEVERITY&asc=false&facets=types,severities" \
              2>/dev/null || echo '{}')

            HOTSPOT_DATA=$(curl -sf --max-time 15 \
              -H "Authorization: Bearer ${SONAR_TOKEN}" \
              "${SONAR_URL}/api/hotspots/search?projectKey=${PROJECT_KEY}&ps=10&status=TO_REVIEW" \
              2>/dev/null || echo '{}')

            QG_STATUS=$(echo "$QG" | jq -r '.projectStatus.status // "UNKNOWN"' 2>/dev/null || echo "UNKNOWN")
          fi

          # Measure extractor (uses pre-fetched $MEASURES)
          m() { echo "$MEASURES" | jq -r --arg k "$1" \
            '.component.measures[] | select(.metric==$k) | (.periods[0].value // .value) // "N/A"' \
            2>/dev/null || echo "N/A"; }

          # ────────────────────────────────────────────────────────────────
          # Determine overall pass/fail
          # ────────────────────────────────────────────────────────────────
          OVERALL_PASS=true
          for r in "$RESULT_SECRET" "$RESULT_SONAR" "$RESULT_LICENSE" "$RESULT_RELEASE" "$RESULT_SBOM"; do
            { [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; } && OVERALL_PASS=false && break
          done

          if [ "$OVERALL_PASS" = "true" ]; then
            OVERALL_BANNER="## ✅ Orion CI — All Checks Passed"
          else
            OVERALL_BANNER="## ❌ Orion CI — One or More Checks Failed"
          fi

          # ────────────────────────────────────────────────────────────────
          # HEADER — run metadata + dashboard table
          # ────────────────────────────────────────────────────────────────
          (
            echo "${OVERALL_BANNER}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Trigger** | \`${EVENT}\` on \`${REF}\` |"
            echo "| **Commit** | [\`${SHA_SHORT}\`](${SERVER_URL}/${REPO}/commit/${SHA}) |"
            echo "| **Runner** | \`${RUNNER_NAME}\` |"
            echo "| **Run** | [View full run](${RUN_URL}) |"
            echo ""
            echo "### Pipeline Dashboard"
            echo ""
            echo "| Stage | Status | Details |"
            echo "|-------|--------|---------|"
            echo "| 🔐 Secret Scanning | $(status_icon "$RESULT_SECRET") | $(secret_detail) |"
            echo "| 🔍 SonarCloud | $([ "$QG_STATUS" = "OK" ] && echo "✅ Passed" || { [ "$RESULT_SONAR" = "skipped" ] && echo "⏭️ Skipped" || echo "❌ Failed"; }) | $(sonar_detail) |"
            echo "| ⚖️ License Compliance | $(status_icon "$RESULT_LICENSE") | $(license_detail) |"
            echo "| 🏷️ Release Please | $([ "${RELEASE_CREATED:-}" = "true" ] && echo "🚀 Released" || status_icon "$RESULT_RELEASE") | $(release_detail) |"
            echo "| 📦 SBOM | $(status_icon "$RESULT_SBOM") | $(sbom_detail) |"
            echo ""
            echo "**Quick navigation:** [Secret Scanning](#-secret-scanning-gitleaks) · [SonarCloud](#-sonarcloud-code-quality) · [License Compliance](#️-license-compliance-trivy) · [Release Please](#️-release-please) · [SBOM](#-sbom-generation)"
            echo ""
            echo "---"
            echo ""
          ) >> "$GITHUB_STEP_SUMMARY" || echo "_Header section failed to render_" >> "$GITHUB_STEP_SUMMARY"

          # ────────────────────────────────────────────────────────────────
          # 1. Secret Scanning
          # ────────────────────────────────────────────────────────────────
          (
            GITLEAKS_FILE="./reports/gitleaks/gitleaks-full-report.json"

            echo "### 🔐 Secret Scanning (Gitleaks)"
            echo ""

            if [ "$RESULT_SECRET" = "skipped" ]; then
              echo "⏭️ _Skipped_"
            elif [ -f "$GITLEAKS_FILE" ]; then
              SCAN_TYPE=$(jq -r '.meta.scan_type // "unknown"' "$GITLEAKS_FILE" 2>/dev/null || echo "unknown")
              GL_VER=$(jq    -r '.meta.gitleaks_version // ""'  "$GITLEAKS_FILE" 2>/dev/null || echo "")
              FINDING_COUNT=$(jq '.findings | length'           "$GITLEAKS_FILE" 2>/dev/null || echo 0)

              if [ "$FINDING_COUNT" -eq 0 ]; then
                echo "**Status: ✅ No secrets detected**"
              else
                echo "**Status: ❌ ${FINDING_COUNT} secret(s) detected — rotate credentials immediately**"
              fi
              echo ""
              echo "> Scan type: \`${SCAN_TYPE}\` | Gitleaks \`${GL_VER}\`"
              echo ""

              if [ "$FINDING_COUNT" -gt 0 ]; then
                echo "| Severity | File | Line | Rule | Description | Commit |"
                echo "|----------|------|------|------|-------------|--------|"
                jq -r '.findings[] |
                  "| \(.Tags // ["UNKNOWN"] | if type == "array" then .[0] else . end) | `\(.File // "unknown")` | \(.StartLine // "—") | `\(.RuleID // "—")` | \(.Description // "—" | gsub("[|]"; "\\|") | .[0:80]) | [`\(.Commit[:7] // "—")`](${{ github.server_url }}/${{ github.repository }}/commit/\(.Commit // "")) |"
                ' "$GITLEAKS_FILE" 2>/dev/null | head -20
                TOTAL=$(jq '.findings | length' "$GITLEAKS_FILE" 2>/dev/null || echo 0)
                [ "$TOTAL" -gt 20 ] && echo "" && echo "_...and $((TOTAL - 20)) more. Download the \`gitleaks-report\` artifact for the full list._"
                echo ""
                echo "> **Remediation:** Rotate any exposed credentials immediately."
                echo "> Remove secrets from git history using [\`git filter-repo\`](https://github.com/newren/git-filter-repo)."
                echo "> If a finding is a false positive, add it to \`.gitleaks.toml\` in your repository root."
              fi
            else
              echo "$(status_icon "$RESULT_SECRET") _(report artifact not available)_"
            fi

            echo ""
            echo "---"
            echo ""
          ) >> "$GITHUB_STEP_SUMMARY" || echo "_Secret scanning section failed to render_" >> "$GITHUB_STEP_SUMMARY"

          # ────────────────────────────────────────────────────────────────
          # 2. SonarCloud
          # ────────────────────────────────────────────────────────────────
          (
            echo "### 🔍 SonarCloud Code Quality"
            echo ""

            if [ "$RESULT_SONAR" = "skipped" ]; then
              echo "⏭️ _Skipped — no \`sonar-project-key\` configured_"
            elif [ -n "${PROJECT_KEY:-}" ] && [ -n "${SONAR_TOKEN:-}" ]; then
              [ "$QG_STATUS" = "OK" ] && QG_ICON="✅ Passed" || QG_ICON="❌ Failed"

              BUGS=$(m "bugs");                    REL_RATING=$(m "reliability_rating")
              VULNS=$(m "vulnerabilities");        SEC_RATING=$(m "security_rating")
              SMELLS=$(m "code_smells");           MNT_RATING=$(m "sqale_rating")
              COVERAGE=$(m "coverage")
              DUPLICATIONS=$(m "duplicated_lines_density")
              HOTSPOTS=$(m "security_hotspots")
              NCLOC=$(m "ncloc")
              DEBT_MINS=$(m "sqale_index")

              NEW_BUGS=$(m "new_bugs");            NEW_VULNS=$(m "new_vulnerabilities")
              NEW_SMELLS=$(m "new_code_smells");   NEW_COV=$(m "new_coverage")
              NEW_HOTSPOTS=$(m "new_security_hotspots")

              echo "**Quality Gate: ${QG_ICON}** | [View in SonarCloud](${SONAR_URL}/project/overview?id=${PROJECT_KEY})"
              echo ""

              # ── Failed Quality Gate conditions ───────────────────────────
              FAILED_CONDS=$(echo "$QG" | jq -r '
                .projectStatus.conditions[]? |
                select(.status == "ERROR") |
                "| \(.metricKey | gsub("_"; " ") | ascii_upcase) | \(.actualValue) | \(.comparator) \(.errorThreshold) |"
              ' 2>/dev/null || true)

              if [ -n "$FAILED_CONDS" ]; then
                echo "<details open><summary>❌ Failed Quality Gate Conditions</summary>"
                echo ""
                echo "| Metric | Actual Value | Threshold |"
                echo "|--------|-------------|-----------|"
                echo "$FAILED_CONDS"
                echo ""
                echo "</details>"
                echo ""
              fi

              # ── Overall metrics ──────────────────────────────────────────
              echo "#### Overall Code Metrics"
              echo ""
              echo "| Metric | Value | Rating |"
              echo "|--------|-------|--------|"
              echo "| 🐛 Bugs | ${BUGS} | $(rating_badge "$REL_RATING") |"
              echo "| 🔒 Vulnerabilities | ${VULNS} | $(rating_badge "$SEC_RATING") |"
              echo "| 🔥 Security Hotspots | ${HOTSPOTS} | — |"
              echo "| 🧹 Code Smells | ${SMELLS} | $(rating_badge "$MNT_RATING") |"
              [ "$COVERAGE"     != "N/A" ] && echo "| 📊 Coverage | ${COVERAGE}% | — |"
              [ "$DUPLICATIONS" != "N/A" ] && echo "| 🔄 Duplications | ${DUPLICATIONS}% | — |"
              [ "$NCLOC"        != "N/A" ] && echo "| 📝 Lines of Code | $(fmt_number "$NCLOC") | — |"
              [ "$DEBT_MINS"    != "N/A" ] && echo "| 💳 Technical Debt | $(fmt_debt "$DEBT_MINS") | — |"
              echo ""

              # ── New code metrics ─────────────────────────────────────────
              HAS_NEW_DATA=false
              for v in "$NEW_BUGS" "$NEW_VULNS" "$NEW_SMELLS" "$NEW_COV" "$NEW_HOTSPOTS"; do
                [ "$v" != "N/A" ] && HAS_NEW_DATA=true && break
              done

              if [ "$HAS_NEW_DATA" = "true" ]; then
                echo "#### New Code Metrics"
                echo ""
                echo "| Metric | Value |"
                echo "|--------|-------|"
                [ "$NEW_BUGS"     != "N/A" ] && echo "| 🐛 New Bugs | ${NEW_BUGS} |"
                [ "$NEW_VULNS"    != "N/A" ] && echo "| 🔒 New Vulnerabilities | ${NEW_VULNS} |"
                [ "$NEW_SMELLS"   != "N/A" ] && echo "| 🧹 New Code Smells | ${NEW_SMELLS} |"
                [ "$NEW_COV"      != "N/A" ] && echo "| 📊 New Coverage | ${NEW_COV}% |"
                [ "$NEW_HOTSPOTS" != "N/A" ] && echo "| 🔥 New Security Hotspots | ${NEW_HOTSPOTS} |"
                echo ""
              fi

              # ── Severity breakdown (from facets) ─────────────────────────
              SEV_FACET=$(echo "$ISSUES" | jq -r '
                (.facets // [])[] | select(.property == "severities") |
                .values[] |
                "| \(.val) | \(.count) |"
              ' 2>/dev/null || true)

              if [ -n "$SEV_FACET" ]; then
                echo "<details><summary>📊 Issue Severity Breakdown</summary>"
                echo ""
                echo "| Severity | Count |"
                echo "|----------|-------|"
                echo "$SEV_FACET"
                echo ""
                echo "</details>"
                echo ""
              fi

              # ── Top issues detail table ──────────────────────────────────
              ISSUE_COUNT=$(echo "$ISSUES" | jq '.issues | length' 2>/dev/null || echo 0)
              TOTAL_ISSUES=$(echo "$ISSUES" | jq '.total // 0' 2>/dev/null || echo 0)

              if [ "${ISSUE_COUNT:-0}" -gt 0 ]; then
                echo "<details><summary>🔎 Top Issues (showing up to 15 of ${TOTAL_ISSUES})</summary>"
                echo ""
                echo "| Severity | Type | Message | File | Line | Effort |"
                echo "|----------|------|---------|------|------|--------|"
                echo "$ISSUES" | jq -r '
                  .issues[]? |
                  ( .component | split(":") | last ) as $file |
                  ( .textRange.startLine // "—" | tostring ) as $line |
                  ( .effort // "—" ) as $effort |
                  ( .message | gsub("[|]"; "\\|") | .[0:90] ) as $msg |
                  "| \(.severity) | \(.type | gsub("_";" ")) | \($msg) | `\($file)` | \($line) | \($effort) |"
                ' 2>/dev/null | head -15
                echo ""
                if [ "${TOTAL_ISSUES:-0}" -gt 15 ]; then
                  echo "_...and $((TOTAL_ISSUES - 15)) more. [View all issues in SonarCloud](${SONAR_URL}/project/issues?id=${PROJECT_KEY})._"
                  echo ""
                fi
                echo "</details>"
                echo ""
              fi

              # ── Security hotspots ────────────────────────────────────────
              HS_COUNT=$(echo "$HOTSPOT_DATA" | jq '.hotspots | length' 2>/dev/null || echo 0)
              HS_TOTAL=$(echo "$HOTSPOT_DATA" | jq '.paging.total // 0' 2>/dev/null || echo 0)

              if [ "${HS_COUNT:-0}" -gt 0 ]; then
                echo "<details><summary>🔥 Security Hotspots Requiring Review (${HS_TOTAL} total)</summary>"
                echo ""
                echo "| Probability | Category | Message | File | Line |"
                echo "|-------------|----------|---------|------|------|"
                echo "$HOTSPOT_DATA" | jq -r '
                  .hotspots[]? |
                  ( .component | split(":") | last ) as $file |
                  ( .textRange.startLine // "—" | tostring ) as $line |
                  ( .message | gsub("[|]"; "\\|") | .[0:90] ) as $msg |
                  "| \(.vulnerabilityProbability) | \(.securityCategory | gsub("-";" ") | ascii_upcase) | \($msg) | `\($file)` | \($line) |"
                ' 2>/dev/null | head -10
                echo ""
                if [ "${HS_TOTAL:-0}" -gt 10 ]; then
                  echo "_...and $((HS_TOTAL - 10)) more. [Review all hotspots in SonarCloud](${SONAR_URL}/project/security_hotspots?id=${PROJECT_KEY})._"
                  echo ""
                fi
                echo "</details>"
                echo ""
              fi

            else
              echo "$(status_icon "$RESULT_SONAR") _(SonarCloud token or project key not available for API query)_"
            fi

            echo ""
            echo "---"
            echo ""
          ) >> "$GITHUB_STEP_SUMMARY" || echo "_SonarCloud section failed to render_" >> "$GITHUB_STEP_SUMMARY"

          # ────────────────────────────────────────────────────────────────
          # 3. License Compliance
          # ────────────────────────────────────────────────────────────────
          (
            LICENSE_FILE="./reports/license/license-report.json"

            echo "### ⚖️ License Compliance (Trivy)"
            echo ""

            if [ "$RESULT_LICENSE" = "skipped" ]; then
              echo "⏭️ _Skipped (release event — no new dependencies introduced)_"
            elif [ -f "$LICENSE_FILE" ]; then
              TOTAL_PKGS=$(jq '.meta.total_packages // 0'     "$LICENSE_FILE" 2>/dev/null || echo 0)
              VIOLATION_COUNT=$(jq '.meta.violation_count // 0' "$LICENSE_FILE" 2>/dev/null || echo 0)
              FORBIDDEN_LIST=$(jq -r '(.meta.forbidden_licenses // []) | join(", ")' "$LICENSE_FILE" 2>/dev/null || echo "—")

              if [ "$VIOLATION_COUNT" -eq 0 ]; then
                echo "**Status: ✅ No violations detected** (${TOTAL_PKGS} packages scanned)"
              else
                echo "**Status: ❌ ${VIOLATION_COUNT} violation(s) detected** (${TOTAL_PKGS} packages scanned)"
              fi
              echo ""
              echo "> Forbidden licenses configured: \`${FORBIDDEN_LIST}\`"
              echo ""

              if [ "$VIOLATION_COUNT" -gt 0 ]; then
                echo "| Package | Version | License | Category | Severity | Source File |"
                echo "|---------|---------|---------|----------|----------|-------------|"
                jq -r '
                  .results[]? |
                  .Target as $target |
                  .Licenses[]? |
                  select(.Category == "forbidden") |
                  "| `\(.PkgName // "unknown")` | \(.PkgVersion // "—") | \(.Name) | \(.Category) | \(.Severity // "—") | `\($target)` |"
                ' "$LICENSE_FILE" 2>/dev/null | head -25
                TOTAL=$(jq '[.results[]?.Licenses[]? | select(.Category == "forbidden")] | length' "$LICENSE_FILE" 2>/dev/null || echo 0)
                [ "$TOTAL" -gt 25 ] && echo "" && echo "_...and $((TOTAL - 25)) more. Download the \`license-report\` artifact for the full list._"
                echo ""
              fi

              # ── Full license inventory (collapsed) ───────────────────────
              ALL_LICENSES=$(jq -r '
                [.results[]?.Licenses[]? | {name: .Name, cat: (.Category // "unknown")}] |
                unique_by(.name) |
                sort_by(.name) |
                .[] |
                "| `\(.name)` | \(.cat) |"
              ' "$LICENSE_FILE" 2>/dev/null | head -60)

              if [ -n "$ALL_LICENSES" ]; then
                echo "<details><summary>📋 Full License Inventory</summary>"
                echo ""
                echo "| License | Category |"
                echo "|---------|----------|"
                echo "$ALL_LICENSES"
                TOTAL_UNIQUE=$(jq '[.results[]?.Licenses[]?.Name] | unique | length' "$LICENSE_FILE" 2>/dev/null || echo "?")
                [ "$TOTAL_UNIQUE" -gt 60 ] && echo "" && echo "_...and more. Download the \`license-report\` artifact for the complete list._"
                echo ""
                echo "</details>"
              fi
            else
              echo "$(status_icon "$RESULT_LICENSE") _(report artifact not available)_"
            fi

            echo ""
            echo "---"
            echo ""
          ) >> "$GITHUB_STEP_SUMMARY" || echo "_License compliance section failed to render_" >> "$GITHUB_STEP_SUMMARY"

          # ────────────────────────────────────────────────────────────────
          # 4. Release Please
          # ────────────────────────────────────────────────────────────────
          (
            echo "### 🏷️ Release Please"
            echo ""

            if [ "$RESULT_RELEASE" = "skipped" ]; then
              echo "⏭️ _Skipped_"
              echo ""
              if [ "${{ inputs.release-type }}" = "" ]; then
                echo "> No \`release-type\` configured for this repository."
              else
                echo "> Only runs on push to \`${{ inputs.main-branch }}\`."
              fi
            elif [ "${RELEASE_CREATED:-}" = "true" ]; then
              echo "**🚀 Release created: [\`${RELEASE_TAG}\`](${SERVER_URL}/${REPO}/releases/tag/${RELEASE_TAG})**"
              echo ""
              echo "| Field | Value |"
              echo "|-------|-------|"
              echo "| Version | \`${RELEASE_VERSION}\` |"
              echo "| Tag | \`${RELEASE_TAG}\` |"
              echo "| Release notes | [${RELEASE_TAG}](${SERVER_URL}/${REPO}/releases/tag/${RELEASE_TAG}) |"
              echo "| SBOM | Attached to release assets |"
            else
              echo "$(status_icon "$RESULT_RELEASE")"
              echo ""
              echo "> No release created this run — Release PR may be open and waiting for merge."
              echo "> [View open Release PRs](${SERVER_URL}/${REPO}/pulls?q=is%3Aopen+label%3Autorelease%3Apending)"
            fi

            echo ""
            echo "---"
            echo ""
          ) >> "$GITHUB_STEP_SUMMARY" || echo "_Release Please section failed to render_" >> "$GITHUB_STEP_SUMMARY"

          # ────────────────────────────────────────────────────────────────
          # 5. SBOM
          # ────────────────────────────────────────────────────────────────
          (
            echo "### 📦 SBOM Generation"
            echo ""

            if [ "$RESULT_SBOM" = "skipped" ]; then
              echo "⏭️ _Skipped — only runs on push to \`${{ inputs.main-branch }}\` or release events_"
            else
              echo "$(status_icon "$RESULT_SBOM")"
              echo ""
              echo "| Format | Artifact |"
              echo "|--------|----------|"
              echo "| SPDX JSON | \`sbom-spdx.json\` |"
              echo "| CycloneDX JSON | \`sbom-cyclonedx.json\` |"
              if [ "${RELEASE_CREATED:-}" = "true" ]; then
                echo ""
                echo "> Both files attached to [Release ${RELEASE_TAG}](${SERVER_URL}/${REPO}/releases/tag/${RELEASE_TAG})."
              fi
            fi

            echo ""
            echo "---"
            echo ""
          ) >> "$GITHUB_STEP_SUMMARY" || echo "_SBOM section failed to render_" >> "$GITHUB_STEP_SUMMARY"

          # ────────────────────────────────────────────────────────────────
          # Footer — generation time
          # ────────────────────────────────────────────────────────────────
          (
            ELAPSED=$(( SECONDS - REPORT_START ))
            echo "<sub>Report generated in ${ELAPSED}s · [Orion Digital Solutions](https://www.orion360.com/)</sub>"
          ) >> "$GITHUB_STEP_SUMMARY" || true
