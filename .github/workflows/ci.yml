name: Orion CI Orchestrator (Reusable)

# Central CI orchestrator — single source of truth for all quality, security,
# and release workflows across every Orion Digital Solutions repository.
#
# ── Caller usage (add ONE file to each project repo) ─────────────────────────
#
#   Single project (most repos):
#     uses: orion-digital-solutions/.github/.github/workflows/ci.yml@main
#     with:
#       sonar-project-key: orion-digital-solutions_my-repo
#       release-type: python
#     secrets: inherit
#
#   Monorepo (multiple Sonar projects / Dockerfiles in one repo): pass the list
#   inputs `sonar-projects` and/or `docker-targets` instead of the scalars above.
#   Both shapes share one orchestrator — a single project is just a length-1 list.
#
# ── Execution model ───────────────────────────────────────────────────────────
#
#   Phase 1 — parallel scans (fast feedback, run on every event):
#     plan              ──► checkout-and-normalise job; turns the scalar inputs OR
#                           the list inputs into two JSON arrays (sonar-projects,
#                           docker-targets) + counts. Emits empty arrays when there
#                           is nothing to do; FAILS LOUDLY on ambiguous/malformed input.
#     secret-scan       ──┐
#     sonarcloud        ──┼──► all must pass. sonarcloud is a MATRIX over plan's
#     license           ──┘   sonar-projects (one leg = one SonarCloud project,
#                           its own Quality Gate + PR decoration); skipped if count 0.
#     docker-lint       ──► MATRIX over plan's docker-targets (one leg per Dockerfile,
#                           each with a unique target-id so artifacts/SARIF never
#                           collide); skipped if count 0. Hadolint + Checkov (lint
#                           only by default). Build, Trivy, Syft, Dive run only when
#                           docker-build-image: true (default false — built in CD).
#
#   Phase 2 — after Phase 1 (exact needs differ per job):
#     release-please  needs [secret-scan, sonarcloud, license-check, docker-lint]
#                       only on push to main (+ release-type OR release-manifest set);
#                       opens/updates Release PR (single-package or monorepo manifest mode)
#                       *** TEMPORARILY DISABLED org-wide (2026-06-06) — see the
#                       `false &&` guard on the release-please job to re-enable. ***
#     sbom            needs [secret-scan, sonarcloud, license-check, docker-lint]
#                       on push to main OR release event. Uses if: always() with a
#                       failure/cancelled guard, so a skipped job (release-event license,
#                       no Sonar key, no Dockerfile) does not block it — only a real failure does.
#
#   Also — inside release-please reusable workflow (when a release is created):
#     post-release    may attach SPDX + CycloneDX via anchore/sbom-action when
#                     generate-sbom-on-release is true (orchestrator sets this true)
#
#   Final — always runs:
#     report  (Actions Summary — SonarCloud Web API via SONAR_ISSUE_RETRIEVAL,
#              plus Gitleaks + license + docker-vuln JSON artifacts)
#
# ── What runs and when (caller triggers the orchestrator) ─────────────────────
#   pull_request     →  Phase 1 + docker-lint (if Dockerfile) + report (release + sbom skipped)
#   push (main)      →  Phase 1 + docker-lint (if Dockerfile) + release-please + sbom + report
#   push (other)     →  Phase 1 + docker-lint (if Dockerfile) + report
#   release created  →  secret-scan + sonar (if key) + docker-lint (if Dockerfile) + sbom + report
#   schedule         →  Phase 1 + docker-lint (if Dockerfile) + report
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      sonar-project-key:
        description: "SonarCloud project key (orion-digital-solutions_<repo>) for a SINGLE-project repo. Leave blank to skip, or when using sonar-projects (monorepo)."
        required: false
        type: string
        default: ""

      sonar-sources:
        description: "Source directory to analyse for the SINGLE-project path (sonar-project-key). Defaults to the repo root. Ignored when sonar-projects is set."
        required: false
        type: string
        default: "."

      # ── Monorepo: multiple SonarCloud projects bound to one repo ──────────────
      # JSON array — one element per sub-project, each its own SonarCloud project
      # (own key, own Quality Gate, own PR decoration). Mutually exclusive with the
      # scalar sonar-project-key above. Each element:
      #   { "key": "...", "base-dir": "apps/web",        # required: key; base-dir for monorepo
      #     "sources": "src",                            # relative to base-dir when set
      #     "project-name": "...",                       # optional, all below optional
      #     "node-version": "20", "python-version": "3.12", "java-version": "17",
      #     "js-coverage-report": "coverage/lcov.info",  # relative to base-dir
      #     "python-coverage-report": "coverage.xml",
      #     "coverage-artifact": "web-cov", "sonar-extra-args": "-Dsonar.x=y" }
      # Set "base-dir" to the sub-project's directory so coverage report paths
      # (which tools emit relative to that dir) resolve — otherwise SonarCloud
      # looks for them at the repo root and reports 0% coverage. With base-dir
      # set, sources/exclusions/coverage paths are interpreted RELATIVE to it.
      # When a PR touches more than one sub-project, every affected project is
      # scanned and posts its own project-labelled Quality Gate check.
      sonar-projects:
        description: "JSON array of monorepo sub-projects (see ci.yml comments). Mutually exclusive with sonar-project-key. Leave blank for the single-project path."
        required: false
        type: string
        default: ""

      sonar-python-coverage-report:
        description: "Path to Python XML coverage report (e.g. coverage.xml)"
        required: false
        type: string
        default: ""

      sonar-js-coverage-report:
        description: "Path to JS/TS LCOV coverage report (e.g. coverage/lcov.info)"
        required: false
        type: string
        default: ""

      # ── SonarCloud coverage import ────────────────────────────────────────────
      # SonarCloud's Quality Gate requires coverage on new code. This orchestrator
      # does NOT run your tests — produce coverage in an EARLIER job in the same run,
      # upload it as an artifact, then name that artifact here and point the
      # report-path inputs above at the files inside it. See the caller template.
      sonar-coverage-artifact:
        description: "Name of the artifact (from an earlier job) holding coverage report(s) to import into the SonarCloud scan."
        required: false
        type: string
        default: ""

      sonar-extra-args:
        description: "Extra raw -Dsonar.* properties for the scan (e.g. coverage report paths for languages without a dedicated input)."
        required: false
        type: string
        default: ""

      python-version:
        description: "Python version to set up (e.g. '3.11'). Leave blank to skip."
        required: false
        type: string
        default: ""

      node-version:
        description: "Node.js version to set up (e.g. '20'). Leave blank to skip."
        required: false
        type: string
        default: ""

      java-version:
        description: "Java version to set up (e.g. '17'). Leave blank to skip."
        required: false
        type: string
        default: ""

      release-type:
        description: "Release Please release type for a SINGLE-package repo (python, node, java, maven, gradle, dotnet, go, simple, ...). Leave blank to skip, or when using release-manifest."
        required: false
        type: string
        default: ""

      release-manifest:
        description: "Use Release Please manifest mode for a monorepo with independently versioned packages. Reads release-please-config.json + .release-please-manifest.json at the repo root. Mutually exclusive with release-type."
        required: false
        type: boolean
        default: false

      main-branch:
        description: "Name of the default/main branch"
        required: false
        type: string
        default: "main"

      forbidden-licenses:
        description: "Comma-separated SPDX license IDs to treat as violations (overrides org default)"
        required: false
        type: string
        default: ""

      secret-scan-full-history:
        description: "Force a full git history secret scan"
        required: false
        type: boolean
        default: false

      runner:
        description: "GitHub Actions runner label"
        required: false
        type: string
        default: "ubuntu-latest"

      # ── Docker best-practices pipeline ────────────────────────────────────────
      # The orchestrator auto-detects a Dockerfile anywhere in the repo. It
      # prefers a bare Dockerfile at the root, then searches subdirectories for
      # a bare Dockerfile (e.g. apps/api/Dockerfile) or a variant (Dockerfile.*),
      # picking the shallowest match. Set dockerfile to an explicit path to
      # override detection, or leave blank to let the orchestrator find it.
      dockerfile:
        description: "Path to the Dockerfile to scan (e.g. apps/api/Dockerfile). Leave blank to auto-detect."
        required: false
        type: string
        default: ""

      docker-context:
        description: "Docker build context. Leave blank to use the detected Dockerfile's directory (repo root for a root Dockerfile)."
        required: false
        type: string
        default: ""

      # ── Monorepo: explicitly list the Dockerfiles to lint/scan ────────────────
      # JSON array — one element per image. Mutually exclusive with the scalar
      # `dockerfile` input. When set, EXACTLY these targets are processed (full
      # control). When blank, the orchestrator auto-detects ALL Dockerfiles in the
      # repo (minus the built-in non-production exclude set and docker-exclude).
      # Each element:
      #   { "dockerfile": "apps/api/Dockerfile",   # required
      #     "context": "apps/api",                  # optional (default: Dockerfile's dir)
      #     "image-name": "api:ci" }                # optional (default: per-target)
      docker-targets:
        description: "JSON array of Dockerfile targets (see ci.yml comments). Mutually exclusive with `dockerfile`. Leave blank to auto-detect all Dockerfiles."
        required: false
        type: string
        default: ""

      docker-exclude:
        description: "Extra path globs to prune from Dockerfile auto-detection (comma- or space-separated), on top of the built-in non-production excludes (examples, test, tests, fixtures, docs, node_modules, vendor, .git)."
        required: false
        type: string
        default: ""

      docker-image-name:
        description: "Name and tag for the CI image (e.g. myapp:ci). Defaults to 'orion-docker-check:ci'."
        required: false
        type: string
        default: ""

      docker-trivy-severity:
        description: "CVE severity levels that fail the Docker vulnerability scan"
        required: false
        type: string
        default: "CRITICAL,HIGH"

      docker-trivy-ignore-unfixed:
        description: "Skip CVEs with no fix available (suppresses base image noise where upstream has not patched yet)"
        required: false
        type: boolean
        default: false

      docker-dive-enable:
        description: "Run Dive image efficiency check in the Docker pipeline"
        required: false
        type: boolean
        default: true

      docker-dive-min-efficiency:
        description: "Minimum Dive image efficiency score (0.0–1.0)"
        required: false
        type: number
        default: 0.9

      docker-grype-enable:
        description: "Run Grype as a second vulnerability scanner alongside Trivy in the Docker pipeline"
        required: false
        type: boolean
        default: false

      docker-build-image:
        description: "Build the image in CI and run the image-dependent Docker jobs (CVE scan, container SBOM, Dive). Default false — CI lints the Dockerfile only (Hadolint + Checkov) and the image is built/scanned in your CD pipeline."
        required: false
        type: boolean
        default: false

    outputs:
      release-created:
        description: "true if a new GitHub Release was created"
        value: ${{ jobs.release-please.outputs.release-created }}
      release-tag:
        description: "Git tag of the new release (e.g. v1.4.0)"
        value: ${{ jobs.release-please.outputs.tag-name }}
      release-version:
        description: "Version string of the new release (e.g. 1.4.0). Empty in manifest mode."
        value: ${{ jobs.release-please.outputs.version }}
      release-paths:
        description: "JSON array of package paths released this run (manifest mode; empty otherwise)"
        value: ${{ jobs.release-please.outputs.paths-released }}

    secrets:
      SONAR_TOKEN:
        description: "SonarCloud token for the SonarCloud scan job (analysis + Quality Gate)"
        required: false
      SONAR_ISSUE_RETRIEVAL:
        description: "SonarCloud token for CI Report only — read-only Web API (Quality Gate, measures, issues, hotspots)"
        required: false
      GITLEAKS_LICENSE:
        description: "Gitleaks Pro license key (optional)"
        required: false

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 1 — Parallel security & quality scans
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  secret-scan:
    name: Secret Scanning
    uses: orion-digital-solutions/.github/.github/workflows/secret-scanning.yml@main
    with:
      full-scan: ${{ inputs.secret-scan-full-history || github.event_name == 'schedule' }}
      runner:    ${{ inputs.runner }}
    secrets:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── SonarCloud (single OR monorepo, matrixed) ──────────────────────────────
  # One leg per project resolved by `plan` (the single-project scalar key becomes
  # a length-1 list). Each leg is its own SonarCloud project with its own Quality
  # Gate and project-labelled PR decoration. A PR touching several sub-projects
  # therefore posts a separate gate check per affected project.
  sonarcloud:
    name: SonarCloud (${{ matrix.proj.key }})
    needs: [plan]
    if: needs.plan.outputs.sonar-count > 0
    strategy:
      fail-fast: false              # one project's gate failing must not cancel the others
      matrix:
        proj: ${{ fromJSON(needs.plan.outputs.sonar-projects) }}
    uses: orion-digital-solutions/.github/.github/workflows/sonarcloud.yml@main
    with:
      project-key:            ${{ matrix.proj.key }}
      project-name:           ${{ matrix.proj.project-name }}
      base-dir:               ${{ matrix.proj.base-dir }}
      sources:                ${{ matrix.proj.sources }}
      python-version:         ${{ matrix.proj.python-version }}
      node-version:           ${{ matrix.proj.node-version }}
      java-version:           ${{ matrix.proj.java-version }}
      python-coverage-report: ${{ matrix.proj.python-coverage-report }}
      js-coverage-report:     ${{ matrix.proj.js-coverage-report }}
      coverage-artifact:      ${{ matrix.proj.coverage-artifact }}
      sonar-extra-args:       ${{ matrix.proj.sonar-extra-args }}
      runner:                 ${{ inputs.runner }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  license-check:
    name: License Compliance
    if: github.event_name != 'release'
    uses: orion-digital-solutions/.github/.github/workflows/license-compliance.yml@main
    with:
      forbidden-licenses: ${{ inputs.forbidden-licenses }}
      runner:             ${{ inputs.runner }}
    secrets: inherit

  # ── Plan: resolve Sonar projects + Docker targets (single OR monorepo) ──────
  # Normalises the scalar inputs (single project / one Dockerfile) and the list
  # inputs (sonar-projects / docker-targets) into two JSON arrays that the matrix
  # jobs above fan out over. A single project is just a length-1 array — one
  # internal code path for both shapes. Runs in parallel with the other Phase 1
  # scans. Emits empty arrays (→ matrix jobs skip) when there is nothing to do,
  # but FAILS LOUDLY on a caller error (ambiguous scalar+list, or malformed JSON)
  # so misconfiguration is never silent.
  plan:
    name: Resolve CI plan
    runs-on: ${{ inputs.runner }}
    outputs:
      sonar-projects: ${{ steps.resolve.outputs.sonar-projects }}
      sonar-count:    ${{ steps.resolve.outputs.sonar-count }}
      docker-targets: ${{ steps.resolve.outputs.docker-targets }}
      docker-count:   ${{ steps.resolve.outputs.docker-count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve plan
        id: resolve
        shell: bash
        env:
          SONAR_KEY:      ${{ inputs.sonar-project-key }}
          SONAR_SOURCES:  ${{ inputs.sonar-sources }}
          SONAR_PROJECTS: ${{ inputs.sonar-projects }}
          SONAR_PY_COV:   ${{ inputs.sonar-python-coverage-report }}
          SONAR_JS_COV:   ${{ inputs.sonar-js-coverage-report }}
          SONAR_COV_ART:  ${{ inputs.sonar-coverage-artifact }}
          SONAR_EXTRA:    ${{ inputs.sonar-extra-args }}
          PY_VERSION:     ${{ inputs.python-version }}
          NODE_VERSION:   ${{ inputs.node-version }}
          JAVA_VERSION:   ${{ inputs.java-version }}
          DOCKER_TARGETS: ${{ inputs.docker-targets }}
          DOCKERFILE:     ${{ inputs.dockerfile }}
          DOCKER_CONTEXT: ${{ inputs.docker-context }}
          DOCKER_IMAGE:   ${{ inputs.docker-image-name }}
          DOCKER_EXCLUDE: ${{ inputs.docker-exclude }}
        run: |
          set -uo pipefail

          # ════════════════════════════════════════════════════════════════════
          # SonarCloud projects → normalised JSON array
          # ════════════════════════════════════════════════════════════════════
          if [ -n "${SONAR_PROJECTS}" ] && [ -n "${SONAR_KEY}" ]; then
            echo "::error::Both 'sonar-project-key' and 'sonar-projects' are set. Pass the scalar key for a single project OR the JSON array for a monorepo — not both."
            exit 1
          fi

          SONAR_JSON='[]'
          if [ -n "${SONAR_PROJECTS}" ]; then
            if ! printf '%s' "${SONAR_PROJECTS}" | jq -e 'type == "array"' >/dev/null 2>&1; then
              echo "::error::'sonar-projects' is not valid JSON (expected an array)."
              exit 1
            fi
            if printf '%s' "${SONAR_PROJECTS}" | jq -e 'length > 0 and any(.[]; (.key // "") == "")' >/dev/null 2>&1; then
              echo "::error::Every element of 'sonar-projects' must have a non-empty \"key\"."
              exit 1
            fi
            # Default 'sources' to the repo root when an element omits it.
            SONAR_JSON=$(printf '%s' "${SONAR_PROJECTS}" | jq -c '[ .[] | .sources = (.sources // ".") ]')
          elif [ -n "${SONAR_KEY}" ]; then
            # Single-project path → synthesize a length-1 list from the scalar inputs.
            SONAR_JSON=$(jq -nc \
              --arg key    "${SONAR_KEY}" \
              --arg src    "${SONAR_SOURCES:-.}" \
              --arg pycov  "${SONAR_PY_COV}" \
              --arg jscov  "${SONAR_JS_COV}" \
              --arg covart "${SONAR_COV_ART}" \
              --arg extra  "${SONAR_EXTRA}" \
              --arg py     "${PY_VERSION}" \
              --arg node   "${NODE_VERSION}" \
              --arg java   "${JAVA_VERSION}" \
              '[{ key: $key, sources: $src,
                  "python-coverage-report": $pycov,
                  "js-coverage-report": $jscov,
                  "coverage-artifact": $covart,
                  "sonar-extra-args": $extra,
                  "python-version": $py,
                  "node-version": $node,
                  "java-version": $java }]')
          fi
          SONAR_COUNT=$(printf '%s' "${SONAR_JSON}" | jq 'length')
          {
            echo "sonar-projects=${SONAR_JSON}"
            echo "sonar-count=${SONAR_COUNT}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved ${SONAR_COUNT} SonarCloud project(s):"
          printf '%s' "${SONAR_JSON}" | jq -r '.[] | "  - \(.key)  (sources: \(.sources))"' || true

          # ════════════════════════════════════════════════════════════════════
          # Docker targets → normalised JSON array
          # ════════════════════════════════════════════════════════════════════
          if [ -n "${DOCKER_TARGETS}" ] && [ -n "${DOCKERFILE}" ]; then
            echo "::error::Both 'dockerfile' and 'docker-targets' are set. Pass the scalar path for one image OR the JSON array for several — not both."
            exit 1
          fi

          DOCKER_JSON='[]'
          if [ -n "${DOCKER_TARGETS}" ]; then
            # ── Explicit list: lint EXACTLY these (full control) ─────────────
            if ! printf '%s' "${DOCKER_TARGETS}" | jq -e 'type == "array"' >/dev/null 2>&1; then
              echo "::error::'docker-targets' is not valid JSON (expected an array)."
              exit 1
            fi
            if printf '%s' "${DOCKER_TARGETS}" | jq -e 'length > 0 and any(.[]; (.dockerfile // "") == "")' >/dev/null 2>&1; then
              echo "::error::Every element of 'docker-targets' must have a non-empty \"dockerfile\"."
              exit 1
            fi
            # Default context to the Dockerfile's dir; derive target-id slug when absent.
            DOCKER_JSON=$(printf '%s' "${DOCKER_TARGETS}" | jq -c '
              def slug: ascii_downcase | gsub("[^a-z0-9]+"; "-") | gsub("(^-)|(-$)"; "");
              [ .[] | {
                  dockerfile: .dockerfile,
                  context: (.context // (if (.dockerfile | test("/")) then (.dockerfile | sub("/[^/]*$"; "")) else "." end)),
                  "image-name": (."image-name" // ""),
                  "target-id": (."target-id" // (.dockerfile | slug))
              } ]')
          elif [ -n "${DOCKERFILE}" ]; then
            # ── Explicit single Dockerfile (back-compat) ─────────────────────
            if [ -f "${DOCKERFILE}" ]; then
              if   [ -n "${DOCKER_CONTEXT}" ];      then CTX="${DOCKER_CONTEXT}"
              elif [[ "${DOCKERFILE}" == */* ]];    then CTX=$(dirname "${DOCKERFILE}")
              else CTX="."; fi
              TID=$(printf '%s' "${DOCKERFILE}" | tr '[:upper:]' '[:lower:]' | sed -e 's|[^a-z0-9]\+|-|g' -e 's|^-||' -e 's|-$||')
              DOCKER_JSON=$(jq -nc --arg df "${DOCKERFILE}" --arg ctx "${CTX}" --arg img "${DOCKER_IMAGE}" --arg tid "${TID}" \
                '[{dockerfile:$df, context:$ctx, "image-name":$img, "target-id":$tid}]')
            else
              echo "::warning::Dockerfile not found at specified path '${DOCKERFILE}'. Docker pipeline will be skipped."
            fi
          else
            # ── Auto-detect ALL Dockerfiles (safest: full coverage) ──────────
            # Prune vendored/VCS dirs; exclude non-production path segments and
            # any caller docker-exclude globs. Shallowest-first for stable order.
            CANDIDATES=$(find . \
                -type d \( -name node_modules -o -name .git -o -name vendor \) -prune -o \
                -type f \( -iname 'Dockerfile' -o -iname 'Dockerfile.*' \) \
                ! -iname '*.md' ! -iname '*.txt' \
                -printf '%d\t%p\n' \
              | sort -k1,1n -k2 | cut -f2- | sed 's|^\./||' \
              | grep -viE '(^|/)(examples|test|tests|fixtures|docs)(/|$)' || true)

            while IFS= read -r f; do
              [ -z "$f" ] && continue
              skip=false
              if [ -n "${DOCKER_EXCLUDE}" ]; then
                for pat in ${DOCKER_EXCLUDE//,/ }; do
                  # shellcheck disable=SC2254
                  case "$f" in $pat) skip=true; break ;; esac
                done
              fi
              if [ "$skip" = true ]; then echo "  - skip (docker-exclude): $f"; continue; fi
              if [[ "$f" == */* ]]; then CTX=$(dirname "$f"); else CTX="."; fi
              TID=$(printf '%s' "$f" | tr '[:upper:]' '[:lower:]' | sed -e 's|[^a-z0-9]\+|-|g' -e 's|^-||' -e 's|-$||')
              DOCKER_JSON=$(printf '%s' "${DOCKER_JSON}" | jq -c --arg df "$f" --arg ctx "$CTX" --arg tid "$TID" \
                '. + [{dockerfile:$df, context:$ctx, "image-name":"", "target-id":$tid}]')
            done <<< "${CANDIDATES}"
          fi
          DOCKER_COUNT=$(printf '%s' "${DOCKER_JSON}" | jq 'length')
          {
            echo "docker-targets=${DOCKER_JSON}"
            echo "docker-count=${DOCKER_COUNT}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved ${DOCKER_COUNT} Docker target(s):"
          printf '%s' "${DOCKER_JSON}" | jq -r '.[] | "  - \(.dockerfile)  (id: \(.["target-id"]), context: \(.context))"' || true

  # ── Docker best-practices pipeline (single OR monorepo, matrixed) ──────────
  # One leg per Docker target resolved by `plan` (explicit docker-targets list,
  # or every auto-detected Dockerfile). Skipped entirely when no target is found.
  # Each leg passes a per-target `target-id` so artifacts and SARIF categories
  # never collide across legs (see docker-lint.yml). Runs Hadolint + Checkov
  # (lint), Trivy + optional Grype (CVEs), Syft (SBOM), Dive (efficiency).
  docker-lint:
    name: Docker (${{ matrix.tgt.target-id }})
    needs: [plan]
    if: needs.plan.outputs.docker-count > 0
    strategy:
      fail-fast: false              # one image's findings must not cancel the others
      matrix:
        tgt: ${{ fromJSON(needs.plan.outputs.docker-targets) }}
    uses: orion-digital-solutions/.github/.github/workflows/docker-lint.yml@main
    with:
      dockerfile:             ${{ matrix.tgt.dockerfile }}
      context:                ${{ matrix.tgt.context }}
      image-name:             ${{ matrix.tgt.image-name || format('orion-docker-check-{0}:ci', matrix.tgt.target-id) }}
      target-id:              ${{ matrix.tgt.target-id }}
      build-image:            ${{ inputs.docker-build-image }}
      trivy-severity:         ${{ inputs.docker-trivy-severity }}
      trivy-ignore-unfixed:   ${{ inputs.docker-trivy-ignore-unfixed }}
      dive-enable:            ${{ inputs.docker-dive-enable }}
      dive-min-efficiency:    ${{ inputs.docker-dive-min-efficiency }}
      grype-enable:           ${{ inputs.docker-grype-enable }}
      sbom-attach-to-release: ${{ github.event_name == 'release' }}
      runner:                 ${{ inputs.runner }}
    secrets: inherit

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 2 — Gated on Phase 1, push to main branch only
# ─────────────────────────────────────────────────────────────────────────────

  release-please:
    name: Release Please
    needs: [secret-scan, sonarcloud, license-check, docker-lint]
    # ── TEMPORARILY DISABLED org-wide (2026-06-06) ───────────────────────────
    # Release automation is paused until every consuming repo is migrated to the
    # caller inputs (release-type / release-manifest). The job stays defined so
    # the report job's `needs` and the workflow outputs still resolve, but the
    # leading `false` below keeps it permanently skipped.
    # TO RE-ENABLE: delete the `false &&` line.
    if: >-
      false &&
      always() &&
      (inputs.release-type != '' || inputs.release-manifest) &&
      github.event_name == 'push' &&
      github.ref_name == inputs.main-branch &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    uses: orion-digital-solutions/.github/.github/workflows/release-please.yml@main
    with:
      release-type:             ${{ inputs.release-type }}
      manifest-mode:            ${{ inputs.release-manifest }}
      target-branch:            ${{ inputs.main-branch }}
      generate-sbom-on-release: true
      runner:                   ${{ inputs.runner }}
    secrets: inherit

  sbom:
    name: SBOM Generation
    needs: [secret-scan, sonarcloud, license-check, docker-lint]
    if: >-
      always() &&
      (
        (github.event_name == 'push' && github.ref_name == inputs.main-branch) ||
        github.event_name == 'release'
      ) &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    uses: orion-digital-solutions/.github/.github/workflows/sbom.yml@main
    with:
      attach-to-release: ${{ github.event_name == 'release' }}
      runner:            ${{ inputs.runner }}
    secrets: inherit

# ─────────────────────────────────────────────────────────────────────────────
# FINAL — Detailed consolidated report (always runs, never fails itself)
# ─────────────────────────────────────────────────────────────────────────────

  report:
    name: CI Report
    needs: [plan, secret-scan, sonarcloud, license-check, release-please, sbom, docker-lint]
    if: always()
    runs-on: ${{ inputs.runner }}

    steps:
      # ── Download artifacts from Phase 1 jobs ────────────────────────────
      - name: Download Gitleaks report
        uses: actions/download-artifact@v7
        with:
          name: gitleaks-report
          path: ./reports/gitleaks
        continue-on-error: true   # artifact may not exist if job was skipped

      - name: Download license report
        uses: actions/download-artifact@v7
        with:
          name: license-report
          path: ./reports/license
        continue-on-error: true

      # One artifact per Docker target (suffixed by target-id); each lands in its
      # own ./reports/docker/<artifact-name>/docker-vuln-report.json subdirectory.
      # Only exist when docker-lint built + scanned an image (docker-build-image).
      - name: Download Docker vulnerability reports
        uses: actions/download-artifact@v7
        with:
          pattern: docker-vuln-report*
          path: ./reports/docker
        continue-on-error: true

      # One per Docker target — the distilled Hadolint + Checkov findings, so the
      # report can show EXACTLY which checks failed (always produced when docker
      # ran, in both lint-only and build modes).
      - name: Download Docker lint findings
        uses: actions/download-artifact@v7
        with:
          pattern: docker-lint-result*
          path: ./reports/docker-lint
        continue-on-error: true

      # ── Step 1: Fetch SonarCloud data (per project) ─────────────────────
      # Loops over every project resolved by `plan` (one for a single-project
      # repo, several for a monorepo), writing per-project data under
      # ./sonar-data/<slug>/. The loop body is constant-size bash and all the
      # JSON arrives via env, so the step stays well under the 21k-char limit.
      # Report APIs use SONAR_ISSUE_RETRIEVAL only — SONAR_TOKEN is for the scan.
      - name: Fetch SonarCloud data
        id: sonar-fetch
        if: always()
        shell: bash
        env:
          RESULT_SONAR:           ${{ needs.sonarcloud.result }}
          SONAR_ISSUE_RETRIEVAL:  ${{ secrets.SONAR_ISSUE_RETRIEVAL }}
          SONAR_PROJECTS:         ${{ needs.plan.outputs.sonar-projects }}
        run: |
          set -uo pipefail
          SONAR_URL="https://sonarcloud.io"
          mkdir -p ./sonar-data

          KEYS=$(printf '%s' "${SONAR_PROJECTS:-[]}" | jq -r '.[].key' 2>/dev/null || true)
          TOTAL=0; PASS=0

          if [ -n "${SONAR_ISSUE_RETRIEVAL:-}" ] && [ "${RESULT_SONAR}" != "skipped" ] && [ -n "${KEYS}" ]; then

            # Retry helper — up to 3 attempts with 5s backoff; returns '{}' on failure.
            sonar_api() {
              local url="$1" attempt body http_code
              for attempt in 1 2 3; do
                body=$(curl -s --max-time 15 -w '\n%{http_code}' \
                  -H "Authorization: Bearer ${SONAR_ISSUE_RETRIEVAL}" "$url" 2>/dev/null || true)
                http_code=$(echo "$body" | tail -1)
                body=$(echo "$body" | sed '$d')
                if [ "$http_code" = "200" ] && echo "$body" | jq . >/dev/null 2>&1; then
                  echo "$body"; return 0
                fi
                echo "::warning::SonarCloud API attempt $attempt failed (HTTP $http_code) for $url" >&2
                sleep 5
              done
              echo '{}'
            }

            METRIC_KEYS="bugs,vulnerabilities,code_smells,coverage,duplicated_lines_density"
            METRIC_KEYS="${METRIC_KEYS},security_hotspots,ncloc,sqale_index"
            METRIC_KEYS="${METRIC_KEYS},reliability_rating,security_rating,sqale_rating"
            METRIC_KEYS="${METRIC_KEYS},new_bugs,new_vulnerabilities,new_code_smells"
            METRIC_KEYS="${METRIC_KEYS},new_coverage,new_security_hotspots,new_security_review_rating"

            while IFS= read -r PROJECT_KEY; do
              [ -z "$PROJECT_KEY" ] && continue
              TOTAL=$((TOTAL+1))
              D="./sonar-data/$(printf '%s' "$PROJECT_KEY" | sed 's|[^A-Za-z0-9._-]|_|g')"
              mkdir -p "$D"
              printf '%s' "$PROJECT_KEY" > "$D/key.txt"

              echo "Polling SonarCloud analysis for ${PROJECT_KEY}..."
              for _ in $(seq 1 18); do
                TASK_STATUS=$(curl -sf --max-time 10 \
                  -H "Authorization: Bearer ${SONAR_ISSUE_RETRIEVAL}" \
                  "${SONAR_URL}/api/ce/component?component=${PROJECT_KEY}" \
                  2>/dev/null | jq -r '.current.status // "UNKNOWN"' 2>/dev/null || echo "UNKNOWN")
                if [ "$TASK_STATUS" = "SUCCESS" ] || [ "$TASK_STATUS" = "FAILED" ]; then break; fi
                sleep 5
              done

              sonar_api "${SONAR_URL}/api/qualitygates/project_status?projectKey=${PROJECT_KEY}"                                                              > "$D/qg.json"
              sonar_api "${SONAR_URL}/api/measures/component?component=${PROJECT_KEY}&metricKeys=${METRIC_KEYS}"                                              > "$D/measures.json"
              sonar_api "${SONAR_URL}/api/issues/search?componentKeys=${PROJECT_KEY}&statuses=OPEN,CONFIRMED,REOPENED&ps=15&s=SEVERITY&asc=false&facets=types,severities" > "$D/issues.json"
              sonar_api "${SONAR_URL}/api/hotspots/search?projectKey=${PROJECT_KEY}&ps=10&status=TO_REVIEW"                                                   > "$D/hotspots.json"

              ST=$(jq -r '.projectStatus.status // "UNKNOWN"' "$D/qg.json" 2>/dev/null || echo "UNKNOWN")
              [ "$ST" = "OK" ] && PASS=$((PASS+1))
              printf '%s' "$ST" > "$D/qg_status.txt"
              echo "  ${PROJECT_KEY}: Quality Gate ${ST}"
            done <<< "${KEYS}"
          else
            # Data can't be fetched (no token / skipped) — still count projects for the dashboard.
            TOTAL=$(printf '%s' "${SONAR_PROJECTS:-[]}" | jq 'length' 2>/dev/null || echo 0)
          fi

          {
            echo "SONAR_TOTAL=${TOTAL}"
            echo "SONAR_PASS=${PASS}"
          } >> "$GITHUB_ENV"

      # ── Step 2: Header + dashboard table ────────────────────────────────
      - name: Report — header and dashboard
        if: always()
        shell: bash
        env:
          RESULT_SECRET:   ${{ needs.secret-scan.result }}
          RESULT_SONAR:    ${{ needs.sonarcloud.result }}
          RESULT_LICENSE:  ${{ needs.license-check.result }}
          RESULT_RELEASE:  ${{ needs.release-please.result }}
          RESULT_SBOM:     ${{ needs.sbom.result }}
          RESULT_DOCKER:   ${{ needs.docker-lint.result }}
          RELEASE_CREATED: ${{ needs.release-please.outputs.release-created }}
          RELEASE_TAG:     ${{ needs.release-please.outputs.tag-name }}
          EVENT:           ${{ github.event_name }}
          REF:             ${{ github.ref_name }}
          SHA:             ${{ github.sha }}
          REPO:            ${{ github.repository }}
          RUN_ID:          ${{ github.run_id }}
          SERVER_URL:      ${{ github.server_url }}
          RUNNER_NAME:     ${{ inputs.runner }}
          DOCKER_BUILD:    ${{ inputs.docker-build-image }}
          DOCKER_TOTAL:    ${{ needs.plan.outputs.docker-count }}
        run: |
          set -uo pipefail
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          SHA_SHORT="${SHA:0:7}"

          status_icon() {
            case "$1" in
              success)   echo "✅ Passed"    ;;
              failure)   echo "❌ Failed"    ;;
              cancelled) echo "🚫 Cancelled" ;;
              skipped)   echo "⏭️ Skipped"  ;;
              *)         echo "⬜ Unknown"   ;;
            esac
          }

          OVERALL_PASS=true
          for r in "$RESULT_SECRET" "$RESULT_SONAR" "$RESULT_LICENSE" "$RESULT_RELEASE" "$RESULT_SBOM" "$RESULT_DOCKER"; do
            { [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; } && OVERALL_PASS=false && break
          done
          [ "$OVERALL_PASS" = "true" ] \
            && BANNER="## ✅ Orion CI — All Checks Passed" \
            || BANNER="## ❌ Orion CI — One or More Checks Failed"

          # One-line detail per stage
          GL_FILE="./reports/gitleaks/gitleaks-full-report.json"
          if   [ "$RESULT_SECRET" = "skipped" ]; then SD="Skipped"
          elif [ ! -f "$GL_FILE" ];              then SD="Report artifact unavailable"
          else
            N=$(jq '.findings | length' "$GL_FILE" 2>/dev/null || echo 0)
            [ "$N" -eq 0 ] && SD="No secrets detected" || SD="${N} secret(s) found — rotate credentials"
          fi

          if   [ "$RESULT_SONAR" = "skipped" ];   then SND="Skipped — no project configured"
          elif [ "${SONAR_TOTAL:-0}" -gt 0 ];     then SND="${SONAR_PASS:-0}/${SONAR_TOTAL} Quality Gate(s) passed"
          elif [ "$RESULT_SONAR" = "success" ];   then SND="Quality Gate passed"
          elif [ "$RESULT_SONAR" = "failure" ];   then SND="Quality Gate failed or scan error"
          else SND="$(status_icon "$RESULT_SONAR")"
          fi

          LC_FILE="./reports/license/license-report.json"
          if   [ "$RESULT_LICENSE" = "skipped" ]; then LD="Skipped (release event)"
          elif [ ! -f "$LC_FILE" ];               then LD="Report artifact unavailable"
          else
            V=$(jq '.meta.violation_count // 0' "$LC_FILE" 2>/dev/null || echo 0)
            T=$(jq '.meta.total_packages  // 0' "$LC_FILE" 2>/dev/null || echo 0)
            R=$(jq '[.results[]?.Licenses[]? | select(.Category=="restricted")] | length' "$LC_FILE" 2>/dev/null || echo 0)
            if   [ "$V" -gt 0 ]; then LD="${V} forbidden license(s) in ${T} packages"
            elif [ "$R" -gt 0 ]; then LD="${R} restricted license(s) detected (${T} packages)"
            else LD="No violations (${T} packages scanned)"
            fi
          fi

          if   [ "$RESULT_RELEASE" = "skipped" ];                              then RD="Skipped"
          elif [ "${RELEASE_CREATED:-}" = "true" ] && [ -n "${RELEASE_TAG:-}" ]; then RD="Released ${RELEASE_TAG}"
          elif [ "${RELEASE_CREATED:-}" = "true" ];                            then RD="Released (manifest — multiple packages)"
          elif [ "$RESULT_RELEASE" = "success" ];                              then RD="No release created — PR may be pending"
          else RD="$(status_icon "$RESULT_RELEASE")"
          fi

          if   [ "$RESULT_SBOM" = "skipped" ]; then SBOMD="Skipped — only runs on push to main or release"
          elif [ "$RESULT_SBOM" = "success" ]; then SBOMD="SPDX + CycloneDX generated"
          else SBOMD="$(status_icon "$RESULT_SBOM")"
          fi

          DK_FILES=$(find ./reports/docker -name 'docker-vuln-report.json' 2>/dev/null || true)
          DK_COUNT=$(printf '%s\n' "${DK_FILES}" | grep -c . || true)
          if   [ "$RESULT_DOCKER" = "skipped" ]; then DD="Skipped — no Dockerfile detected"
          elif [ "$DOCKER_BUILD" != "true" ] && [ "$RESULT_DOCKER" = "success" ]; then DD="Lint passed (${DOCKER_TOTAL:-?} image(s)) — build/scan runs in CD"
          elif [ "${DK_COUNT:-0}" -eq 0 ];       then DD="$(status_icon "$RESULT_DOCKER")"
          else
            TOTAL_VULN=$(printf '%s\n' "${DK_FILES}" | while IFS= read -r f; do [ -n "$f" ] && jq '.meta.vulnerability_count // 0' "$f" 2>/dev/null; done | awk '{s+=$1} END{print s+0}')
            SEVERITY=$(printf '%s\n' "${DK_FILES}" | head -1 | xargs -r jq -r '.meta.severity_filter // "CRITICAL,HIGH"' 2>/dev/null || echo "CRITICAL,HIGH")
            if [ "${TOTAL_VULN:-0}" -eq 0 ]; then
              DD="No vulnerabilities across ${DOCKER_TOTAL:-?} image(s) at ${SEVERITY}"
            else
              DD="${TOTAL_VULN} vulnerability/vulnerabilities across ${DOCKER_TOTAL:-?} image(s) at ${SEVERITY}"
            fi
          fi

          if   [ "$RESULT_SONAR" = "skipped" ];   then SONAR_ST="⏭️ Skipped"
          elif [ "$RESULT_SONAR" = "success" ];  then SONAR_ST="✅ Passed"
          elif [ "$RESULT_SONAR" = "failure" ];  then SONAR_ST="❌ Failed"
          elif [ "$RESULT_SONAR" = "cancelled" ]; then SONAR_ST="🚫 Cancelled"
          else SONAR_ST="⬜ Unknown"
          fi

          REL_ST=$([ "${RELEASE_CREATED:-}" = "true" ] && echo "🚀 Released" || status_icon "$RESULT_RELEASE")

          {
            echo "${BANNER}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Trigger** | \`${EVENT}\` on \`${REF}\` |"
            echo "| **Commit** | [\`${SHA_SHORT}\`](${SERVER_URL}/${REPO}/commit/${SHA}) |"
            echo "| **Runner** | \`${RUNNER_NAME}\` |"
            echo "| **Run** | [View full run](${RUN_URL}) |"
            echo ""
            echo "### Pipeline Dashboard"
            echo ""
            echo "| Stage | Status | Details |"
            echo "|-------|--------|---------|"
            echo "| 🔐 Secret Scanning | $(status_icon "$RESULT_SECRET") | ${SD} |"
            echo "| 🔍 SonarCloud | ${SONAR_ST} | ${SND} |"
            echo "| ⚖️ License Compliance | $(status_icon "$RESULT_LICENSE") | ${LD} |"
            echo "| 🏷️ Release Please | ${REL_ST} | ${RD} |"
            echo "| 📦 SBOM | $(status_icon "$RESULT_SBOM") | ${SBOMD} |"
            echo "| 🐳 Docker | $(status_icon "$RESULT_DOCKER") | ${DD} |"
            echo ""
            echo "---"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Step 3: Secret Scanning section ─────────────────────────────────
      - name: Report — secret scanning
        if: always()
        shell: bash
        env:
          RESULT_SECRET: ${{ needs.secret-scan.result }}
          REPO:          ${{ github.repository }}
          SERVER_URL:    ${{ github.server_url }}
        run: |
          set -uo pipefail
          GL_FILE="./reports/gitleaks/gitleaks-full-report.json"

          status_icon() {
            case "$1" in
              success)   echo "✅ Passed"    ;;
              failure)   echo "❌ Failed"    ;;
              cancelled) echo "🚫 Cancelled" ;;
              skipped)   echo "⏭️ Skipped"  ;;
              *)         echo "⬜ Unknown"   ;;
            esac
          }

          {
            echo "### 🔐 Secret Scanning (Gitleaks)"
            echo ""

            if [ "$RESULT_SECRET" = "skipped" ]; then
              echo "⏭️ _Skipped_"
            elif [ -f "$GL_FILE" ]; then
              SCAN_TYPE=$(jq -r '.meta.scan_type // "unknown"' "$GL_FILE" 2>/dev/null || echo "unknown")
              GL_VER=$(jq    -r '.meta.gitleaks_version // ""'  "$GL_FILE" 2>/dev/null || echo "")
              FC=$(jq '.findings | length' "$GL_FILE" 2>/dev/null || echo 0)

              [ "$FC" -eq 0 ] \
                && echo "**Status: ✅ No secrets detected**" \
                || echo "**Status: ❌ ${FC} secret(s) detected — rotate credentials immediately**"
              echo ""
              echo "> Scan type: \`${SCAN_TYPE}\` | Gitleaks \`${GL_VER}\`"
              echo ""

              if [ "$FC" -gt 0 ]; then
                echo "| Severity | File | Line | Rule | Description | Commit |"
                echo "|----------|------|------|------|-------------|--------|"
                jq -r --arg base "${SERVER_URL}/${REPO}/commit/" '
                  .findings[] |
                  ( .Tags // ["UNKNOWN"] | if type=="array" then .[0] else . end ) as $sev |
                  ( .Description // "—" | gsub("[|]";"\\|") | .[0:80] ) as $desc |
                  "| \($sev) | `\(.File // "unknown")` | \(.StartLine // "—") | `\(.RuleID // "—")` | \($desc) | [`\(.Commit[:7] // "—")`](\($base)\(.Commit // "")) |"
                ' "$GL_FILE" 2>/dev/null | head -20
                TOTAL=$(jq '.findings | length' "$GL_FILE" 2>/dev/null || echo 0)
                [ "$TOTAL" -gt 20 ] && echo "" && echo "_...and $((TOTAL-20)) more. Download the \`gitleaks-report\` artifact for the full list._"
                echo ""
                echo "> **Remediation:** Rotate any exposed credentials immediately."
                echo "> Remove secrets from git history using [\`git filter-repo\`](https://github.com/newren/git-filter-repo)."
                echo "> If a finding is a false positive, add it to \`.gitleaks.toml\` in your repository root."
              fi
            else
              echo "$(status_icon "$RESULT_SECRET") _(report artifact not available)_"
            fi

            echo ""
            echo "---"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Step 4: SonarCloud section ───────────────────────────────────────
      - name: Report — SonarCloud
        if: always()
        shell: bash
        env:
          RESULT_SONAR:          ${{ needs.sonarcloud.result }}
          SONAR_PROJECTS:        ${{ needs.plan.outputs.sonar-projects }}
          SONAR_ISSUE_RETRIEVAL: ${{ secrets.SONAR_ISSUE_RETRIEVAL }}
          REPO:                  ${{ github.repository }}
          SERVER_URL:            ${{ github.server_url }}
          SHA:                   ${{ github.sha }}
        run: |
          set -uo pipefail
          SONAR_URL="https://sonarcloud.io"

          rating_badge() {
            case "${1%.*}" in
              1) echo "🟢 A" ;; 2) echo "🟡 B" ;; 3) echo "🟠 C" ;;
              4) echo "🔴 D" ;; 5) echo "🔴 E" ;; *) echo "—"    ;;
            esac
          }
          fmt_number() { echo "$1" | awk '{printf "%\047d\n",$1}' 2>/dev/null || echo "$1"; }
          fmt_debt() {
            local m="$1"
            echo "$m" | grep -qE '^[0-9]+$' || { echo "—"; return; }
            local d=$(( m/480 )) h=$(( (m%480)/60 )) r=$(( m%60 )) o=""
            [ $d -gt 0 ] && o="${d}d "
            [ $h -gt 0 ] && o="${o}${h}h "
            [ $r -gt 0 ] && o="${o}${r}min"
            echo "${o%% }" | grep -q . && echo "${o%% }" || echo "< 1min"
          }
          # Overall metric value (ignores new-code period — always returns the total)
          m() {
            local v
            v=$(jq -r --arg k "$1" \
              '.component.measures[]? | select(.metric==$k) | .value // ""' \
              "${D}/measures.json" 2>/dev/null || true)
            [ -n "$v" ] && echo "$v" || echo "N/A"
          }
          # New-code period value (only set when a new-code period exists)
          mn() {
            local v
            v=$(jq -r --arg k "$1" \
              '.component.measures[]? | select(.metric==$k) | .periods[0].value // ""' \
              "${D}/measures.json" 2>/dev/null || true)
            [ -n "$v" ] && echo "$v" || echo "N/A"
          }

          {
            echo "### 🔍 SonarCloud Code Quality"
            echo ""

            if [ "$RESULT_SONAR" = "skipped" ]; then
              echo "⏭️ _Skipped — no SonarCloud project configured_"
            elif [ -z "${SONAR_ISSUE_RETRIEVAL:-}" ]; then
              echo "$([ "$RESULT_SONAR" = "success" ] && echo "✅" || echo "⚠️") _SonarCloud data not available in report step — check the \`SONAR_ISSUE_RETRIEVAL\` secret_"
            else
              echo "**${SONAR_PASS:-0}/${SONAR_TOTAL:-0} project Quality Gate(s) passed**"
              echo ""

              # One collapsible block per project (single-project repos have exactly one).
              while IFS= read -r PROJECT_KEY; do
                [ -z "$PROJECT_KEY" ] && continue
                D="./sonar-data/$(printf '%s' "$PROJECT_KEY" | sed 's|[^A-Za-z0-9._-]|_|g')"
                [ -d "$D" ] || continue
                QG_STATUS=$(cat "$D/qg_status.txt" 2>/dev/null || echo "UNKNOWN")
                [ "$QG_STATUS" = "OK" ] && QG_ICON="✅ Passed" || QG_ICON="❌ Failed"

                echo "<details><summary>${QG_ICON} — <code>${PROJECT_KEY}</code></summary>"
                echo ""
                echo "[View in SonarCloud](${SONAR_URL}/project/overview?id=${PROJECT_KEY})"
                echo ""

                FAILED_CONDS=$(jq -r '
                  .projectStatus.conditions[]? |
                  select(.status=="ERROR") |
                  "| \(.metricKey | gsub("_";" ") | ascii_upcase) | \(.actualValue) | \(.comparator) \(.errorThreshold) |"
                ' "$D/qg.json" 2>/dev/null || true)

              if [ -n "$FAILED_CONDS" ]; then
                echo "<details open><summary>❌ Failed Quality Gate Conditions</summary>"
                echo ""
                echo "| Metric | Actual Value | Threshold |"
                echo "|--------|-------------|-----------|"
                echo "$FAILED_CONDS"
                echo ""
                echo "</details>"
                echo ""
              fi

              BUGS=$(m bugs);      REL_R=$(m reliability_rating)
              VULNS=$(m vulnerabilities); SEC_R=$(m security_rating)
              SMELLS=$(m code_smells);   MNT_R=$(m sqale_rating)
              COV=$(m coverage);   DUP=$(m duplicated_lines_density)
              HS=$(m security_hotspots); LOC=$(m ncloc); DEBT=$(m sqale_index)

              echo "#### Overall Code Metrics"
              echo ""
              echo "| Metric | Value | Rating |"
              echo "|--------|-------|--------|"
              echo "| 🐛 Bugs | ${BUGS} | $(rating_badge "$REL_R") |"
              echo "| 🔒 Vulnerabilities | ${VULNS} | $(rating_badge "$SEC_R") |"
              echo "| 🔥 Security Hotspots | ${HS} | — |"
              echo "| 🧹 Code Smells | ${SMELLS} | $(rating_badge "$MNT_R") |"
              [ "$COV"  != "N/A" ] && echo "| 📊 Coverage | ${COV}% | — |"
              [ "$DUP"  != "N/A" ] && echo "| 🔄 Duplications | ${DUP}% | — |"
              [ "$LOC"  != "N/A" ] && echo "| 📝 Lines of Code | $(fmt_number "$LOC") | — |"
              [ "$DEBT" != "N/A" ] && echo "| 💳 Technical Debt | $(fmt_debt "$DEBT") | — |"
              echo ""

              NB=$(mn new_bugs); NV=$(mn new_vulnerabilities); NS=$(mn new_code_smells)
              NC=$(mn new_coverage); NH=$(mn new_security_hotspots)
              HAS_NEW=false
              for v in "$NB" "$NV" "$NS" "$NC" "$NH"; do [ "$v" != "N/A" ] && HAS_NEW=true && break; done

              if [ "$HAS_NEW" = "true" ]; then
                echo "#### New Code Metrics"
                echo ""
                echo "| Metric | Value |"
                echo "|--------|-------|"
                [ "$NB" != "N/A" ] && echo "| 🐛 New Bugs | ${NB} |"
                [ "$NV" != "N/A" ] && echo "| 🔒 New Vulnerabilities | ${NV} |"
                [ "$NS" != "N/A" ] && echo "| 🧹 New Code Smells | ${NS} |"
                [ "$NC" != "N/A" ] && echo "| 📊 New Coverage | ${NC}% |"
                [ "$NH" != "N/A" ] && echo "| 🔥 New Security Hotspots | ${NH} |"
                echo ""
              fi

              SEV_FACET=$(jq -r '
                (.facets // [])[] | select(.property=="severities") |
                .values[] | "| \(.val) | \(.count) |"
              ' "$D/issues.json" 2>/dev/null || true)
              if [ -n "$SEV_FACET" ]; then
                echo "<details><summary>📊 Issue Severity Breakdown</summary>"
                echo ""
                echo "| Severity | Count |"
                echo "|----------|-------|"
                echo "$SEV_FACET"
                echo ""
                echo "</details>"
                echo ""
              fi

              IC=$(jq '.issues | length' "$D/issues.json" 2>/dev/null || echo 0)
              IT=$(jq '.total // 0'     "$D/issues.json" 2>/dev/null || echo 0)
              REPO_URL="${SERVER_URL}/${REPO}"
              if [ "${IC:-0}" -eq 0 ] && [ "$QG_STATUS" != "OK" ]; then
                echo "> No individual issues were returned from the API. The Quality Gate may have failed due to metric thresholds (e.g. coverage, ratings). Check the [SonarCloud dashboard](${SONAR_URL}/project/issues?id=${PROJECT_KEY}) for details."
                echo ""
              fi
              if [ "${IC:-0}" -gt 0 ]; then
                echo "<details><summary>🔎 Top Issues (showing up to 15 of ${IT})</summary>"
                echo ""
                echo "| Severity | Type | Message | Location | Effort |"
                echo "|----------|------|---------|----------|--------|"
                jq -r --arg repo_url "${REPO_URL}" --arg sha "${SHA}" '
                  .issues[]? |
                  (.component | split(":") | last) as $f |
                  (.textRange.startLine // "—" | tostring) as $l |
                  (.effort // "—") as $e |
                  (.message | gsub("[|]";"\\|") | .[0:90]) as $m |
                  if $l != "—" then
                    "| \(.severity) | \(.type | gsub("_";" ")) | \($m) | [`\($f):\($l)`](\($repo_url)/blob/\($sha)/\($f)#L\($l)) | \($e) |"
                  else
                    "| \(.severity) | \(.type | gsub("_";" ")) | \($m) | `\($f)` | \($e) |"
                  end
                ' "$D/issues.json" 2>/dev/null | head -15
                echo ""
                [ "${IT:-0}" -gt 15 ] && echo "_...and $((IT-15)) more. [View all in SonarCloud](${SONAR_URL}/project/issues?id=${PROJECT_KEY})._" && echo ""
                echo "</details>"
                echo ""
              fi

              HC=$(jq '.hotspots | length'  "$D/hotspots.json" 2>/dev/null || echo 0)
              HT=$(jq '.paging.total // 0'  "$D/hotspots.json" 2>/dev/null || echo 0)
              if [ "${HC:-0}" -gt 0 ]; then
                echo "<details><summary>🔥 Security Hotspots Requiring Review (${HT} total)</summary>"
                echo ""
                echo "| Probability | Category | Message | Location |"
                echo "|-------------|----------|---------|----------|"
                jq -r --arg repo_url "${REPO_URL}" --arg sha "${SHA}" '
                  .hotspots[]? |
                  (.component | split(":") | last) as $f |
                  (.textRange.startLine // "—" | tostring) as $l |
                  (.message | gsub("[|]";"\\|") | .[0:90]) as $m |
                  if $l != "—" then
                    "| \(.vulnerabilityProbability) | \(.securityCategory | gsub("-";" ") | ascii_upcase) | \($m) | [`\($f):\($l)`](\($repo_url)/blob/\($sha)/\($f)#L\($l)) |"
                  else
                    "| \(.vulnerabilityProbability) | \(.securityCategory | gsub("-";" ") | ascii_upcase) | \($m) | `\($f)` |"
                  end
                ' "$D/hotspots.json" 2>/dev/null | head -10
                echo ""
                [ "${HT:-0}" -gt 10 ] && echo "_...and $((HT-10)) more. [Review all hotspots](${SONAR_URL}/project/security_hotspots?id=${PROJECT_KEY})._" && echo ""
                echo "</details>"
                echo ""
              fi

                echo "</details>"
                echo ""
              done <<< "$(printf '%s' "${SONAR_PROJECTS:-[]}" | jq -r '.[].key' 2>/dev/null)"
            fi

            echo ""
            echo "---"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Step 5: License Compliance section ──────────────────────────────
      - name: Report — license compliance
        if: always()
        shell: bash
        env:
          RESULT_LICENSE: ${{ needs.license-check.result }}
        run: |
          set -uo pipefail
          LC_FILE="./reports/license/license-report.json"

          status_icon() {
            case "$1" in
              success)   echo "✅ Passed"    ;;
              failure)   echo "❌ Failed"    ;;
              cancelled) echo "🚫 Cancelled" ;;
              skipped)   echo "⏭️ Skipped"  ;;
              *)         echo "⬜ Unknown"   ;;
            esac
          }

          {
            echo "### ⚖️ License Compliance (Trivy)"
            echo ""

            if [ "$RESULT_LICENSE" = "skipped" ]; then
              echo "⏭️ _Skipped (release event — no new dependencies introduced)_"
            elif [ -f "$LC_FILE" ]; then
              TOTAL_PKGS=$(jq '.meta.total_packages // 0'    "$LC_FILE" 2>/dev/null || echo 0)
              VIOLATIONS=$(jq '.meta.violation_count // 0'   "$LC_FILE" 2>/dev/null || echo 0)
              FORBIDDEN_CFG=$(jq -r '(.meta.forbidden_licenses // []) | join(", ")' "$LC_FILE" 2>/dev/null || echo "—")
              RESTRICTED_COUNT=$(jq '[.results[]?.Licenses[]? | select(.Category=="restricted")] | length' "$LC_FILE" 2>/dev/null || echo 0)

              # Status derives from the actual job result, not just the violation count.
              # Trivy can fail due to restricted (non-forbidden) licenses too.
              if   [ "$RESULT_LICENSE" = "failure" ] && [ "$VIOLATIONS" -gt 0 ]; then
                echo "**Status: ❌ ${VIOLATIONS} forbidden license violation(s) detected** (${TOTAL_PKGS} packages scanned)"
              elif [ "$RESULT_LICENSE" = "failure" ] && [ "$RESTRICTED_COUNT" -gt 0 ]; then
                echo "**Status: ⚠️ Job failed — ${RESTRICTED_COUNT} restricted license(s) detected** (${TOTAL_PKGS} packages scanned)"
                echo ""
                echo "> Trivy flagged packages with **restricted** licenses (e.g. LGPL). These are not in the"
                echo "> forbidden list but may require review depending on your project's usage. Check with legal"
                echo "> if you distribute software containing LGPL components."
              elif [ "$RESULT_LICENSE" = "failure" ]; then
                echo "**Status: ❌ License scan failed** (${TOTAL_PKGS} packages scanned)"
              elif [ "$VIOLATIONS" -eq 0 ]; then
                echo "**Status: ✅ No forbidden violations detected** (${TOTAL_PKGS} packages scanned)"
              else
                echo "**Status: ❌ ${VIOLATIONS} violation(s) detected** (${TOTAL_PKGS} packages scanned)"
              fi
              echo ""
              [ -n "$FORBIDDEN_CFG" ] && [ "$FORBIDDEN_CFG" != "—" ] \
                && echo "> Forbidden licenses configured: \`${FORBIDDEN_CFG}\`" \
                && echo ""

              if [ "$VIOLATIONS" -gt 0 ]; then
                echo "#### Forbidden License Violations"
                echo ""
                echo "| Package | Version | License | Severity | Source File |"
                echo "|---------|---------|---------|----------|-------------|"
                jq -r '
                  .results[]? | .Target as $t | .Licenses[]? |
                  select(.Category=="forbidden") |
                  "| `\(.PkgName // "unknown")` | \(.PkgVersion // "—") | \(.Name) | \(.Severity // "—") | `\($t)` |"
                ' "$LC_FILE" 2>/dev/null | head -25
                VTOTAL=$(jq '[.results[]?.Licenses[]? | select(.Category=="forbidden")] | length' "$LC_FILE" 2>/dev/null || echo 0)
                [ "$VTOTAL" -gt 25 ] && echo "" && echo "_...and $((VTOTAL-25)) more. Download the \`license-report\` artifact for the full list._"
                echo ""
              fi

              if [ "$RESTRICTED_COUNT" -gt 0 ]; then
                echo "<details><summary>⚠️ Restricted Licenses Detected (${RESTRICTED_COUNT} — review required)</summary>"
                echo ""
                echo "| Package | Version | License | Severity | Source File |"
                echo "|---------|---------|---------|----------|-------------|"
                jq -r '
                  .results[]? | .Target as $t | .Licenses[]? |
                  select(.Category=="restricted") |
                  "| `\(.PkgName // "unknown")` | \(.PkgVersion // "—") | \(.Name) | \(.Severity // "—") | `\($t)` |"
                ' "$LC_FILE" 2>/dev/null | head -25
                RTOTAL=$(jq '[.results[]?.Licenses[]? | select(.Category=="restricted")] | length' "$LC_FILE" 2>/dev/null || echo 0)
                [ "$RTOTAL" -gt 25 ] && echo "" && echo "_...and $((RTOTAL-25)) more. Download the \`license-report\` artifact for the full list._"
                echo ""
                echo "</details>"
                echo ""
              fi

              ALL_LIC=$(jq -r '
                [.results[]?.Licenses[]? | {n:.Name, c:(.Category//"unknown")}] |
                unique_by(.n) | sort_by(.n) | .[] |
                "| `\(.n)` | \(.c) |"
              ' "$LC_FILE" 2>/dev/null | head -60)

              if [ -n "$ALL_LIC" ]; then
                echo "<details><summary>📋 Full License Inventory</summary>"
                echo ""
                echo "| License | Category |"
                echo "|---------|----------|"
                echo "$ALL_LIC"
                UNIQ=$(jq '[.results[]?.Licenses[]?.Name] | unique | length' "$LC_FILE" 2>/dev/null || echo "?")
                [ "${UNIQ:-0}" -gt 60 ] && echo "" && echo "_...and more. Download the \`license-report\` artifact for the complete list._"
                echo ""
                echo "</details>"
              fi
            else
              echo "$(status_icon "$RESULT_LICENSE") _(report artifact not available)_"
            fi

            echo ""
            echo "---"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Step 6: Docker Best Practices section (per target) ──────────────────
      # Loops over every Docker target resolved by `plan`. Lint-only runs list
      # each Dockerfile; build+scan runs render one collapsible block per image.
      - name: Report — Docker Best Practices
        if: always()
        shell: bash
        env:
          RESULT_DOCKER:  ${{ needs.docker-lint.result }}
          DOCKER_TARGETS: ${{ needs.plan.outputs.docker-targets }}
          DOCKER_COUNT:   ${{ needs.plan.outputs.docker-count }}
          DOCKER_BUILD:   ${{ inputs.docker-build-image }}
          DIVE_MIN:       ${{ inputs.docker-dive-min-efficiency }}
        run: |
          set -uo pipefail

          status_icon() {
            case "$1" in
              success)   echo "✅ Passed"    ;;
              failure)   echo "❌ Failed"    ;;
              cancelled) echo "🚫 Cancelled" ;;
              skipped)   echo "⏭️ Skipped"  ;;
              *)         echo "⬜ Unknown"   ;;
            esac
          }

          {
            echo "### 🐳 Docker Best Practices"
            echo ""

            if [ "$RESULT_DOCKER" = "skipped" ] || [ "${DOCKER_COUNT:-0}" -eq 0 ]; then
              echo "⏭️ _Skipped — no Dockerfile detected in this repository_"
              echo ""
              echo "> To enable the Docker pipeline, add a \`Dockerfile\` at the repo root or in"
              echo "> any subdirectory (e.g. \`apps/api/Dockerfile\`), set \`dockerfile:\`, or pass a"
              echo "> \`docker-targets\` list in your CI caller."
            else
              if [ "${DOCKER_BUILD:-false}" != "true" ]; then
                echo "**Status: $(status_icon "$RESULT_DOCKER") — Dockerfile lint only (${DOCKER_COUNT} image(s))**"
              else
                echo "**Status: $(status_icon "$RESULT_DOCKER") — lint + build/scan (${DOCKER_COUNT} image(s))**"
              fi
              echo ""

              # ── Lint findings (always) — exact Hadolint/Checkov results per file ──
              # Distilled by each docker-lint leg into docker-lint-result.json, so a
              # failure shows WHICH checks failed, not just "Failed".
              LINT_FILES=$(find ./reports/docker-lint -name 'docker-lint-result.json' 2>/dev/null | sort || true)
              if [ -n "${LINT_FILES}" ]; then
                while IFS= read -r LF; do
                  [ -z "$LF" ] && continue
                  DF=$(jq -r '.dockerfile // "Dockerfile"'      "$LF" 2>/dev/null || echo "Dockerfile")
                  HO=$(jq -r '.hadolint_outcome // "unknown"'   "$LF" 2>/dev/null || echo "unknown")
                  CO=$(jq -r '.checkov_outcome // "unknown"'    "$LF" 2>/dev/null || echo "unknown")
                  HLN=$(jq '.hadolint_findings | length'        "$LF" 2>/dev/null || echo 0)
                  CKN=$(jq '.checkov_failed | length'           "$LF" 2>/dev/null || echo 0)
                  if [ "$HO" = "failure" ] || [ "$CO" = "failure" ]; then LICON="❌"; else LICON="✅"; fi

                  echo "<details><summary>${LICON} <code>${DF}</code> — Hadolint: ${HO}, Checkov: ${CO}</summary>"
                  echo ""
                  if [ "${CKN:-0}" -gt 0 ]; then
                    echo "**Failed Checkov checks (${CKN}):**"
                    echo ""
                    echo "| Check | Line | Message |"
                    echo "|-------|------|---------|"
                    jq -r '.checkov_failed[] | "| `\(.id)` | \(.line) | \(.msg | gsub("[|]";"\\|") | .[0:90]) |"' "$LF" 2>/dev/null | head -25
                    echo ""
                  fi
                  if [ "${HLN:-0}" -gt 0 ]; then
                    echo "**Hadolint findings (${HLN}):**"
                    echo ""
                    echo "| Rule | Level | Line | Message |"
                    echo "|------|-------|------|---------|"
                    jq -r '.hadolint_findings[] | "| `\(.id)` | \(.level) | \(.line) | \(.msg | gsub("[|]";"\\|") | .[0:80]) |"' "$LF" 2>/dev/null | head -25
                    echo ""
                  fi
                  if [ "${CKN:-0}" -eq 0 ] && [ "${HLN:-0}" -eq 0 ]; then
                    echo "All Hadolint and Checkov checks passed."
                    echo ""
                  fi
                  echo "</details>"
                  echo ""
                done <<< "${LINT_FILES}"
              else
                echo "$(status_icon "$RESULT_DOCKER") _(lint findings artifact unavailable — open the failed Docker leg's log)_"
                echo ""
                printf '%s' "${DOCKER_TARGETS:-[]}" | jq -r '.[] | "> - `\(.dockerfile)`"' 2>/dev/null || true
                echo ""
              fi

              # ── CVE findings (build mode only) — one block per scanned image ──────
              if [ "${DOCKER_BUILD:-false}" = "true" ]; then
                DK_FILES=$(find ./reports/docker -name 'docker-vuln-report.json' 2>/dev/null | sort || true)
                GRAND_TOTAL=0
                while IFS= read -r DK_FILE; do
                  [ -z "$DK_FILE" ] && continue
                  IMAGE=$(jq -r '.meta.image // "unknown"'                 "$DK_FILE" 2>/dev/null || echo "unknown")
                  DSHA=$(jq -r  '.meta.sha   // "unknown"'                 "$DK_FILE" 2>/dev/null || echo "unknown")
                  SEV=$(jq -r   '.meta.severity_filter // "CRITICAL,HIGH"' "$DK_FILE" 2>/dev/null || echo "CRITICAL,HIGH")
                  VULN_COUNT=$(jq '.meta.vulnerability_count // 0'         "$DK_FILE" 2>/dev/null || echo "0")
                  GRAND_TOTAL=$((GRAND_TOTAL + VULN_COUNT))
                  [ "$VULN_COUNT" -eq 0 ] && ST_ICON="✅" || ST_ICON="❌"

                  echo "<details><summary>${ST_ICON} CVEs — <code>${IMAGE}</code> — ${VULN_COUNT} at ${SEV}</summary>"
                  echo ""
                  echo "> Image: \`${IMAGE}\` | Commit: \`${DSHA:0:7}\`"
                  echo ""
                  if [ "$VULN_COUNT" -gt 0 ]; then
                    echo "| Severity | Package | CVE | Title |"
                    echo "|----------|---------|-----|-------|"
                    jq -r '
                      .results[]? | .Target as $t |
                      .Vulnerabilities[]? |
                      ( .Severity // "UNKNOWN" ) as $sev |
                      ( .VulnerabilityID // "—" ) as $cve |
                      ( .PkgName // "unknown" ) as $pkg |
                      ( .Title // .Description // "—" | gsub("[|]";"\\|") | .[0:80] ) as $title |
                      "| \($sev) | `\($pkg)` | `\($cve)` | \($title) |"
                    ' "$DK_FILE" 2>/dev/null | sort -t'|' -k2 | head -20
                    TOTAL=$(jq '[.results[]?.Vulnerabilities // [] | length] | add // 0' "$DK_FILE" 2>/dev/null || echo 0)
                    [ "${TOTAL:-0}" -gt 20 ] && echo "" && echo "_...and $((TOTAL-20)) more. Download the \`docker-vuln-report*\` artifacts for the full list._"
                  fi
                  echo ""
                  echo "</details>"
                  echo ""
                done <<< "${DK_FILES}"

                if [ "${GRAND_TOTAL:-0}" -gt 0 ]; then
                  echo "> **Remediation:** Update base images to patched versions, or pin specific"
                  echo "> package versions and rebuild. Review the GitHub Security tab for SARIF findings."
                  echo ""
                fi
              fi

              echo "<details><summary>📋 Docker pipeline sub-checks</summary>"
              echo ""
              echo "| Check | Tool | Purpose |"
              echo "|-------|------|---------|"
              echo "| Linting | Hadolint | Dockerfile best-practice rules + ShellCheck |"
              echo "| IaC Security | Checkov | Misconfigurations (root user, no HEALTHCHECK, :latest tag) |"
              echo "| CVE Scan | Trivy | OS + language package vulnerabilities, secrets, misconfigs |"
              echo "| Container SBOM | Syft | SPDX JSON + CycloneDX JSON for the built image |"
              echo "| Efficiency | Dive | Layer efficiency score (threshold: \`${DIVE_MIN}\`) |"
              echo ""
              echo "</details>"
            fi

            echo ""
            echo "---"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Step 7: Release Please + SBOM + footer ───────────────────────────
      - name: Report — release and SBOM
        if: always()
        shell: bash
        env:
          RESULT_RELEASE:  ${{ needs.release-please.result }}
          RESULT_SBOM:     ${{ needs.sbom.result }}
          RELEASE_CREATED: ${{ needs.release-please.outputs.release-created }}
          RELEASE_TAG:     ${{ needs.release-please.outputs.tag-name }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
          RELEASE_PATHS:   ${{ needs.release-please.outputs.paths-released }}
          RELEASE_TYPE:    ${{ inputs.release-type }}
          RELEASE_MANIFEST: ${{ inputs.release-manifest }}
          MAIN_BRANCH:     ${{ inputs.main-branch }}
          REPO:            ${{ github.repository }}
          SERVER_URL:      ${{ github.server_url }}
        run: |
          set -uo pipefail

          status_icon() {
            case "$1" in
              success)   echo "✅ Passed"    ;;
              failure)   echo "❌ Failed"    ;;
              cancelled) echo "🚫 Cancelled" ;;
              skipped)   echo "⏭️ Skipped"  ;;
              *)         echo "⬜ Unknown"   ;;
            esac
          }

          {
            echo "### 🏷️ Release Please"
            echo ""

            if [ "$RESULT_RELEASE" = "skipped" ]; then
              echo "⏭️ _Skipped_"
              echo ""
              if [ -z "${RELEASE_TYPE:-}" ] && [ "${RELEASE_MANIFEST:-}" != "true" ]; then
                echo "> No \`release-type\` or \`release-manifest\` configured for this repository."
              else
                echo "> Only runs on push to \`${MAIN_BRANCH}\`."
              fi
            elif [ "${RELEASE_CREATED:-}" = "true" ] && [ -n "${RELEASE_TAG:-}" ]; then
              # Single-package release (one tag)
              echo "**🚀 Release created: [\`${RELEASE_TAG}\`](${SERVER_URL}/${REPO}/releases/tag/${RELEASE_TAG})**"
              echo ""
              echo "| Field | Value |"
              echo "|-------|-------|"
              echo "| Version | \`${RELEASE_VERSION}\` |"
              echo "| Tag | \`${RELEASE_TAG}\` |"
              echo "| Release notes | [${RELEASE_TAG}](${SERVER_URL}/${REPO}/releases/tag/${RELEASE_TAG}) |"
              echo "| SBOM | Attached to release assets |"
            elif [ "${RELEASE_CREATED:-}" = "true" ]; then
              # Manifest release — one or more packages, no single tag
              echo "**🚀 Release(s) created (manifest mode)**"
              echo ""
              echo "Released package paths:"
              echo ""
              echo '```json'
              echo "${RELEASE_PATHS:-[]}"
              echo '```'
              echo ""
              echo "> See the [Releases page](${SERVER_URL}/${REPO}/releases) for per-package tags and notes."
            else
              echo "$(status_icon "$RESULT_RELEASE")"
              echo ""
              echo "> No release created this run — Release PR may be open and waiting for merge."
              echo "> [View open Release PRs](${SERVER_URL}/${REPO}/pulls?q=is%3Aopen+label%3Autorelease%3Apending)"
            fi

            echo ""
            echo "---"
            echo ""
            echo "### 📦 SBOM Generation"
            echo ""

            if [ "$RESULT_SBOM" = "skipped" ]; then
              echo "⏭️ _Skipped — only runs on push to \`${MAIN_BRANCH}\` or release events_"
            else
              echo "$(status_icon "$RESULT_SBOM")"
              echo ""
              echo "| Format | Artifact |"
              echo "|--------|----------|"
              echo "| SPDX JSON | \`sbom-spdx.json\` |"
              echo "| CycloneDX JSON | \`sbom-cyclonedx.json\` |"
              if [ "${RELEASE_CREATED:-}" = "true" ]; then
                echo ""
                echo "> Both files attached to [Release ${RELEASE_TAG}](${SERVER_URL}/${REPO}/releases/tag/${RELEASE_TAG})."
              fi
            fi

            echo ""
            echo "---"
            echo ""
            echo "<sub>Report generated · [Orion Digital Solutions](https://www.orion360.com/)</sub>"
          } >> "$GITHUB_STEP_SUMMARY"
