name: Bug Report
description: Report a bug or unexpected behavior in an Orion Digital Solutions project
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check [existing issues](../../issues) to avoid duplicates,
        and review the [Support Guide](https://github.com/orion-digital-solutions/.github/blob/main/SUPPORT.md).

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reliably reproduce the issue.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the expected outcome...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or unexpected output.
      placeholder: Describe what actually occurred...
    validations:
      required: true

  - type: input
    id: repository
    attributes:
      label: Repository
      description: Which Orion repository is affected?
      placeholder: "e.g. orion-ml-pipeline"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Branch
      description: The version tag or branch name where the bug occurs.
      placeholder: "e.g. v2.1.0 or main"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 11
        - Windows 10
        - Ubuntu 22.04
        - Ubuntu 20.04
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Other (describe in Additional Context)
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime / Language Version
      description: Language runtime and version in use.
      placeholder: "e.g. Python 3.11, Node 20, .NET 8, Java 17"
    validations:
      required: true

  - type: input
    id: dependencies
    attributes:
      label: Key Dependencies
      description: Relevant library or tool versions involved in the bug.
      placeholder: "e.g. pandas 2.0, Blue Prism 7.1, langchain 0.2"

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste relevant logs, stack traces, or error messages. These will be formatted automatically as code.
      render: text
      placeholder: Paste logs here...

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, workarounds you have tried, related issues, or any other relevant information.
