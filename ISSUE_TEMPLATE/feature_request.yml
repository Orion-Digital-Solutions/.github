name: Feature Request
description: Suggest a new feature or enhancement for an Orion Digital Solutions project
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to suggest an improvement.
        Check [existing issues](../../issues) first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Describe the problem or limitation you're facing. What are you trying to accomplish?
      placeholder: "I'm trying to... but I can't because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you'd like to see. Be as specific as possible.
      placeholder: Describe your proposed solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: Describe any alternatives you have already explored...

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Describe a concrete scenario where this feature would be used. Who benefits and how?
      placeholder: "As a [role], I want to [goal] so that [benefit]..."
    validations:
      required: true

  - type: checkboxes
    id: domain
    attributes:
      label: Relevant Domain
      description: Select all areas this feature relates to.
      options:
        - label: Data & Analytics
        - label: AI & Machine Learning
        - label: Robotic Process Automation (RPA)
        - label: Software Engineering
        - label: Automation / Workflows
        - label: CI/CD / DevOps
        - label: Documentation

  - type: dropdown
    id: priority
    attributes:
      label: Priority (your assessment)
      options:
        - Nice to have
        - Important
        - Critical / blocking
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, diagrams, references, related issues, or any other information that helps explain the request.
