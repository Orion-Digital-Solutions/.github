name: Orion CI

# This is the ONLY workflow file you need to add to a project repository.
# It calls Orion's central CI orchestrator which runs all quality, security,
# and release pipelines in the correct order with a consolidated report.
#
# ── Setup checklist ──────────────────────────────────────────────────────────
# 1. Set `release-type` to match your project (or remove it to skip releases).
# 2. Set `sonar-project-key` to your SonarCloud project key (or remove to skip).
#    Monorepo? Use `sonar-projects` (a JSON array) instead — see the SonarCloud block below.
# 3. Org secrets — SonarCloud: two tokens — SONAR_TOKEN (scan); SONAR_ISSUE_RETRIEVAL (CI Report / APIs).
# 4. Set one of python-version / node-version / java-version if needed.
# 5. Coverage: this template is one job — see org README for coverage + Sonar caveats.
# 6. Commit this file — the orchestrator handles everything else.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]
  schedule:
    # Weekly full-history secret + license scan (Monday 06:00 UTC)
    - cron: "0 6 * * 1"

jobs:
  ci:
    name: Orion CI
    uses: orion-digital-solutions/.github/.github/workflows/ci.yml@main
    with:
      # ── Release ─────────────────────────────────────────────────────────
      # SINGLE-package repo: set release-type. Options: python, node, java,
      # maven, dotnet, go, simple. Remove the line to disable automated releases.
      release-type: python   # <-- change or remove
      #
      # MONOREPO (independently versioned packages): remove release-type above
      # and use manifest mode instead — commit release-please-config.json +
      # .release-please-manifest.json at the repo root (each package configured
      # there). Then uncomment:
      # release-manifest: true

      # ── SonarCloud ──────────────────────────────────────────────────────
      # SINGLE project: set the key (orion-digital-solutions_<repository-name>).
      # Remove this line to skip SonarCloud.
      sonar-project-key: orion-digital-solutions_${{ github.event.repository.name }}
      #
      # MONOREPO (multiple SonarCloud projects in one repo): remove
      # sonar-project-key above and use sonar-projects instead — a JSON array,
      # one object per sub-project (each its own SonarCloud project + Quality
      # Gate + PR check). Create each project in SonarCloud first ("Add new
      # project" under the monorepo binding). A PR touching several sub-projects
      # gets a separate, project-labelled gate check for each. Example:
      # sonar-projects: >-
      #   [{"key":"orion-digital-solutions_myrepo-web","sources":"apps/web","node-version":"20","js-coverage-report":"apps/web/coverage/lcov.info","coverage-artifact":"web-cov"},
      #    {"key":"orion-digital-solutions_myrepo-api","sources":"apps/api","node-version":"20","js-coverage-report":"apps/api/coverage/lcov.info","coverage-artifact":"api-cov"},
      #    {"key":"orion-digital-solutions_myrepo-py","sources":"services/py","python-version":"3.12","python-coverage-report":"services/py/coverage.xml","coverage-artifact":"py-cov"}]

      # ── Runtime (uncomment what your project needs) ──────────────────────
      # python-version: "3.11"
      # node-version: "20"
      # java-version: "17"

      # ── SonarCloud COVERAGE (required for the Quality Gate to pass) ──────
      # The Sonar Way gate requires >=80% coverage on NEW code. This CI does NOT
      # run your tests — if you import no coverage, Sonar sees 0% and the gate
      # FAILS. Coverage must be produced by YOUR repo and handed to CI:
      #
      #   1. Add a `test` job (above this one) that runs your tests with coverage
      #      and produces a Sonar-supported report:
      #         JS/TS  -> coverage/lcov.info   Python -> coverage.xml   (etc.)
      #   2. That job uploads the report(s) as an artifact, preserving repo-relative
      #      paths (list each file so the paths are kept):
      #         - uses: actions/upload-artifact@v7
      #           with:
      #             name: coverage-reports
      #             path: |
      #               coverage/lcov.info
      #               coverage.xml
      #   3. Make THIS job wait for it:   needs: [test]
      #   4. Name the artifact + point Sonar at the files inside it:
      #
      # sonar-coverage-artifact: coverage-reports
      # sonar-js-coverage-report: coverage/lcov.info
      # sonar-python-coverage-report: coverage.xml
      # For other languages, pass raw scanner props instead, e.g.:
      # sonar-extra-args: "-Dsonar.go.coverage.reportPaths=cov.out"

      # ── Docker best-practices pipeline ──────────────────────────────────
      # Auto-detects ALL Dockerfiles in the repo (root or any subdirectory) and
      # lints each — no config required. Non-production paths (examples, test,
      # tests, fixtures, docs, node_modules, vendor) are excluded automatically.
      # By default CI only LINTS each Dockerfile (Hadolint + Checkov). The image
      # is built and CVE-scanned in your CD pipeline. Set docker-build-image: true
      # only if you want CI to also build + scan + SBOM + Dive the image(s).
      #
      # docker-build-image: false          # true = CI builds & scans the image too
      #
      # Uncomment and adjust the options below only if you need to override
      # the defaults, exclude paths, or pin specific Dockerfiles.
      #
      # dockerfile: "Dockerfile"           # pin ONE explicit path (disables auto-detect)
      # docker-exclude: "samples/*, **/*.dev"   # extra globs to skip during auto-detect
      # docker-image-name: "myapp:ci"      # image tag used during CI (never pushed)
      # docker-trivy-severity: "CRITICAL,HIGH"
      # docker-dive-enable: true
      # docker-dive-min-efficiency: 0.9    # fail if layer efficiency < 90%
      # docker-grype-enable: false         # set true to add Grype as a second CVE scanner
      #
      # MONOREPO — pin an explicit set of Dockerfiles (full control; disables
      # auto-detect). JSON array, one object per image:
      # docker-targets: >-
      #   [{"dockerfile":"apps/web/Dockerfile","context":"apps/web"},
      #    {"dockerfile":"apps/api/Dockerfile","context":"apps/api"}]

      # ── Advanced (rarely need changing) ─────────────────────────────────
      # main-branch: "main"
      # forbidden-licenses: "GPL-2.0,GPL-3.0,AGPL-3.0"
      # secret-scan-full-history: false
    secrets: inherit
