name: Secret Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Full history scan every Monday at 06:00 UTC
    - cron: "0 6 * * 1"

jobs:
  secret-scan:
    name: Secret Scanning
    uses: orion-digital-solutions/.github/.github/workflows/secret-scanning.yml@main
    with:
      # On scheduled runs, scan full git history.
      # On push/PR, only the delta is scanned (default).
      full-scan: ${{ github.event_name == 'schedule' }}
    secrets: inherit
