name: Release Please

on:
  push:
    branches: [main]

jobs:
  release:
    name: Release Please
    uses: orion-digital-solutions/.github/.github/workflows/release-please.yml@main
    with:
      # ── Required — set the correct type for this project ─────────────────
      # Common values: python, node, java, maven, dotnet, go, simple
      release-type: python   # <-- change this

      # ── Optional overrides ───────────────────────────────────────────────
      # target-branch: "main"              # default
      # version-file: "pyproject.toml"     # auto-detected from release-type
      # changelog-path: "CHANGELOG.md"     # default
      # generate-sbom-on-release: true     # default in reusable wf — SBOM on release via post-release job
      #                                      (orchestrator also runs sbom on `release` events — see org README)
    secrets: inherit

