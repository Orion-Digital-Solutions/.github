name: License Compliance (Reusable)

# Reusable workflow — scans dependencies for OSS license compliance using Trivy.
#
# Caller usage:
#   uses: orion-digital-solutions/.github/workflows/license-compliance.yml@main
#   with:
#     forbidden-licenses: "GPL-2.0,GPL-3.0,AGPL-3.0"
#   secrets: inherit
#
# ── Why this matters ──────────────────────────────────────────────────────────
# As a consulting firm delivering software to enterprise clients, GPL/AGPL
# licenses in transitive dependencies can create contractual and IP obligations.
#
# ── Artifacts ────────────────────────────────────────────────────────────────
# Uploads `license-report` artifact (JSON) for the CI orchestrator report job.
# Also uploads SARIF to the GitHub Security tab (Code Scanning).
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      forbidden-licenses:
        description: "Comma-separated SPDX license IDs to treat as violations"
        required: false
        type: string
        default: "GPL-2.0,GPL-3.0,AGPL-1.0,AGPL-3.0,LGPL-2.0,LGPL-2.1,LGPL-3.0,EUPL-1.1,EUPL-1.2,CCDL-1.0,OSL-3.0"

      allowed-licenses:
        description: "Comma-separated SPDX license IDs that are explicitly permitted"
        required: false
        type: string
        default: "MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0,CC0-1.0,Unlicense,Python-2.0,PSF-2.0"

      scan-path:
        description: "Directory to scan for dependency manifests"
        required: false
        type: string
        default: "."

      severity:
        description: "Minimum severity to report: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
        required: false
        type: string
        default: "HIGH,CRITICAL"

      upload-sarif:
        description: "Upload SARIF results to GitHub Security tab"
        required: false
        type: boolean
        default: true

      runner:
        description: "GitHub Actions runner label"
        required: false
        type: string
        default: "ubuntu-latest"

permissions:
  contents: read
  security-events: write

jobs:
  license-check:
    name: OSS License Compliance
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Build Trivy config from inputs ───────────────────────────────────
      - name: Prepare Trivy license config
        id: license-config
        shell: bash
        env:
          FORBIDDEN: ${{ inputs.forbidden-licenses }}
          ALLOWED:   ${{ inputs.allowed-licenses }}
        run: |
          cat > trivy-license.yaml << EOF
          license:
            forbidden:
          $(echo "${FORBIDDEN}" | tr ',' '\n' | sed 's/^/    - /')
            ignored:
          $(echo "${ALLOWED}"   | tr ',' '\n' | sed 's/^/    - /')
          EOF
          echo "config_path=trivy-license.yaml" >> "$GITHUB_OUTPUT"

      # ── Scan 1: Table (job log summary) — fails on violations ────────────
      - name: Trivy license scan — table (fail on violations)
        id: trivy-table
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type:    fs
          scan-ref:     ${{ inputs.scan-path }}
          scanners:     license
          severity:     ${{ inputs.severity }}
          trivy-config: ${{ steps.license-config.outputs.config_path }}
          format:       table
          exit-code:    "1"

      # ── Scan 2: JSON (artifact for report) ───────────────────────────────
      - name: Trivy license scan — JSON (report artifact)
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type:    fs
          scan-ref:     ${{ inputs.scan-path }}
          scanners:     license
          severity:     ${{ inputs.severity }}
          trivy-config: ${{ steps.license-config.outputs.config_path }}
          format:       json
          output:       trivy-license-raw.json
          exit-code:    "0"

      # ── Enrich JSON with metadata ─────────────────────────────────────────
      - name: Enrich license report with metadata
        if: always()
        shell: bash
        env:
          FORBIDDEN: ${{ inputs.forbidden-licenses }}
          SEVERITY:  ${{ inputs.severity }}
        run: |
          RAW_FILE="trivy-license-raw.json"
          [ -f "$RAW_FILE" ] || echo '{"Results":[]}' > "$RAW_FILE"

          # Count total packages and violations
          TOTAL_PKGS=$(jq '[.Results[].Licenses // [] | length] | add // 0' "$RAW_FILE" 2>/dev/null || echo "0")
          VIOLATIONS=$(jq '[.Results[].Licenses // [] | .[] | select(.Category == "forbidden")] | length' "$RAW_FILE" 2>/dev/null || echo "0")

          jq -n \
            --argjson raw "$(cat "$RAW_FILE")" \
            --arg forbidden "$FORBIDDEN" \
            --arg severity "$SEVERITY" \
            --argjson total_packages "$TOTAL_PKGS" \
            --argjson violation_count "$VIOLATIONS" \
            '{
              meta: {
                forbidden_licenses: ($forbidden | split(",")),
                severity_filter: $severity,
                total_packages: $total_packages,
                violation_count: $violation_count
              },
              results: $raw.Results
            }' > license-report.json

      # ── Upload JSON report artifact ───────────────────────────────────────
      - name: Upload license report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: license-report.json
          retention-days: 7
          if-no-files-found: warn

      # ── Scan 3: SARIF (GitHub Security tab) ──────────────────────────────
      - name: Trivy license scan — SARIF (Security tab)
        if: inputs.upload-sarif && !cancelled()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type:    fs
          scan-ref:     ${{ inputs.scan-path }}
          scanners:     license
          severity:     ${{ inputs.severity }}
          trivy-config: ${{ steps.license-config.outputs.config_path }}
          format:       sarif
          output:       trivy-license.sarif
          exit-code:    "0"

      - name: Upload SARIF to GitHub Security tab
        if: inputs.upload-sarif && !cancelled()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-license.sarif
          category:   license-compliance

      # ── Fail the job if violations were found ────────────────────────────
      - name: Fail if license violations detected
        if: steps.trivy-table.outcome == 'failure'
        shell: bash
        run: |
          COUNT=$(jq '.meta.violation_count' license-report.json 2>/dev/null || echo "unknown")
          echo "::error::${COUNT} license violation(s) detected. Review the 'license-report' artifact for details."
          exit 1
