name: Secret Scanning (Reusable)

# Reusable workflow — Gitleaks secret detection across all Orion repositories.
#
# Caller usage:
#   uses: orion-digital-solutions/.github/workflows/secret-scanning.yml@main
#   secrets: inherit
#
# ── Delta scanning behaviour ──────────────────────────────────────────────────
# Pull requests  → scans only the commits in the PR diff (not full history).
# Push to branch → scans only the newly pushed commits.
# Scheduled run  → full repository history scan (catch anything that slipped through).
#
# ── Custom rules ─────────────────────────────────────────────────────────────
# Place a .gitleaks.toml file in the calling repository root to extend or
# override rules (e.g. to allowlist known false positives).
# See: https://github.com/gitleaks/gitleaks#configuration
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      # Run a full history scan in addition to the delta scan.
      # Useful when enabling this workflow on an existing repository for the first time.
      full-scan:
        description: "Scan the full git history (use once when enabling on an existing repo)"
        required: false
        type: boolean
        default: false

      # Gitleaks version to pin — update org-wide by changing this default.
      gitleaks-version:
        description: "Gitleaks version to use (e.g. v8.18.4)"
        required: false
        type: string
        default: "v8.18.4"

      runner:
        description: "GitHub Actions runner label"
        required: false
        type: string
        default: "ubuntu-latest"

    secrets:
      # Optional: supply a Gitleaks license key to unlock the full ruleset.
      # Store as an org-level secret named GITLEAKS_LICENSE if you have one.
      GITLEAKS_LICENSE:
        description: "Gitleaks license key (optional — unlocks additional rules)"
        required: false

permissions:
  contents: read
  security-events: write   # upload SARIF results to GitHub Security tab
  pull-requests: read

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ${{ inputs.runner }}

    steps:
      # fetch-depth: 0 required — Gitleaks needs full history for delta detection
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Delta scan on push / PR ──────────────────────────────────────────
      # Gitleaks-action automatically:
      #   • On pull_request: scans only the commits in the PR (git diff base..head)
      #   • On push:         scans only the newly pushed commits
      #   • Reads .gitleaks.toml from the repo root if present
      - name: Gitleaks — delta scan
        if: "!inputs.full-scan"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # ── Full history scan (first-time onboarding or scheduled) ───────────
      - name: Gitleaks — full history scan
        if: inputs.full-scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: --log-opts="--all"
